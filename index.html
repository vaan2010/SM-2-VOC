        function applyFirebaseDayDeck(dayKey, dayNode, firebaseCategoryPrefix) {
            const catPrefix =
                firebaseCategoryPrefix === undefined || firebaseCategoryPrefix === null
                    ? ''
                    : String(firebaseCategoryPrefix);
            if (!dayNode || typeof dayNode !== 'object') {
                alert('無法讀取「' + dayKey + '」的資料。');
                return;
            }
            const raw = extractEntriesFromUnknownJson(dayNode);
            if (!raw.length) {
                alert('目前沒有任何單字。');
                return;
            }
            const progressKey = firebaseCloudProgressStorageKey(catPrefix, dayKey);
            const newBaseline = raw.map(normalizeEntry).filter((w) => w.keyword);
            closeDayPickOverlay();

            /** 進度只存在本機；Firebase 僅更新單字內容。擇優合併兩份 local 快照時勿用線上詞數當仲裁。 */
            const snapCloud = getCloudDayProgress(progressKey);
            const snapStorage = readStorageFirebaseSnapshotForKey(progressKey);
            const snap = pickBetterFirebaseProgressSnap(snapCloud, snapStorage, null);

            if (!snap) {
                applyImportedDeck(raw, dayKey, {
                    source: 'firebase',
                    firebaseDeckDisplayName: progressKey,
                });
                return;
            }

            const snapStats =
                snap.stats && typeof snap.stats === 'object'
                    ? snap.stats
                    : { again: 0, hard: 0, good: 0, easy: 0 };

            baselineWords = newBaseline;
            initialTotal = baselineWords.length;
            deckSource = 'firebase';
            currentDeckDisplayName = progressKey;
            wordsList = mergeWordsQueueWithNewBaseline(snap.wordsList, newBaseline);
            stats.again = Number(snapStats.again) || 0;
            stats.hard = Number(snapStats.hard) || 0;
            stats.good = Number(snapStats.good) || 0;
            stats.easy = Number(snapStats.easy) || 0;

            isFlipped = false;
            resetFlip();
            updateStatsUi();
            persistState();
            updateDeckTitleUi();
            enterStudyBoard();
        }

        function flattenExtract(data) {
            if (!data || typeof data !== 'object') return [];
            // gemini-image-words 補充匯出：{ extracts: [{ results: [{ entries: [...] }] }] }
            if (Array.isArray(data.extracts)) {
                return data.extracts.flatMap((chunk) => {
                    if (!chunk || typeof chunk !== 'object') return [];
                    const results = chunk.results;
                    if (!Array.isArray(results)) return [];
                    return results.flatMap((r) => (Array.isArray(r?.entries) ? r.entries : []));
                });
            }
            const ext = data.extract || data;
            const results = ext.results;
            if (!Array.isArray(results)) return [];
            return results.flatMap((r) => (Array.isArray(r?.entries) ? r.entries : []));
        }

        function extractEntriesFromUnknownJson(data) {
            if (!data) return [];
            const fromExtract = flattenExtract(data);
            if (fromExtract.length) return fromExtract;
            if (Array.isArray(data.extract?.entries)) return data.extract.entries;
            if (Array.isArray(data)) {
                if (data.length && typeof data[0] === 'object' && (data[0].keyword != null || data[0].word != null)) return data;
                return [];
            }
            if (Array.isArray(data.words)) return data.words;
            if (Array.isArray(data.entries)) return data.entries;
            return [];
        }

        function normalizeExample(ex) {
            if (typeof ex === 'string') return { en: ex.trim(), zh: '' };
            if (!ex || typeof ex !== 'object') return { en: '', zh: '' };
            return {
                en: String(ex.en ?? ex.text ?? '').trim(),
                zh: String(ex.zh ?? ex.translation ?? '').trim(),
            };
        }

        function normalizePhrase(p) {
            if (typeof p === 'string') return { en: p.trim(), zh: '' };
            if (!p || typeof p !== 'object') return { en: '', zh: '' };
            return { en: String(p.en ?? '').trim(), zh: String(p.zh ?? '').trim() };
        }

        function normalizeEntry(e) {
            const keyword = String(e.keyword ?? e.word ?? '').trim();
            const kk = String(
                e.kk ?? e.kk_phonetic ?? e.phonetic_kk ?? e.phoneticKK ?? e.kkPhonetic ?? ''
            ).trim();
            return {
                keyword,
                kk,
                pos: String(e.pos ?? e.partOfSpeech ?? '').trim() || '—',
                synonyms: Array.isArray(e.synonyms) ? e.synonyms.map(s => String(s).trim()).filter(Boolean) : [],
                zh_gloss: String(e.zh_gloss ?? e.zhGloss ?? e.gloss ?? e.zh ?? '').trim(),
                examples: Array.isArray(e.examples) ? e.examples.map(normalizeExample).filter(x => x.en) : [],
                phrases: Array.isArray(e.phrases) ? e.phrases.map(normalizePhrase).filter(x => x.en || x.zh) : [],
            };
        }

        function buildWordsFromData(data) {
            return extractEntriesFromUnknownJson(data).map(normalizeEntry).filter(w => w.keyword);
        }

        let baselineWords = buildWordsFromData(rawJsonData);
        let initialTotal = baselineWords.length;
        let wordsList = baselineWords.slice();
        let currentDeckDisplayName = '';
        /** 目前牌組來源：雲端 DAY 需在 persist 時同步寫入 CLOUD_DAY_PROGRESS_KEY */
        let deckSource = 'import';
        /** 是否已進入單字學習主畫面（首屏僅顯示歡迎頁）；每次重新載入頁面重置為未進入 */
        let studyBoardVisible = false;
        /** 章節選擇第二層快取，供重置後重整格子不必再連線；關閉選單時保留供下次零等待開啟。 */
        let dayPickFirebaseSnapshot = null;
        /**
         * Firebase 選取層級：`undefined`=未載入／已關閉；`''`=根下直接為 DAY；非空字串=該書節點鍵名（進度前缀 `書 · DAY`）。
         */
        let dayPickFirebaseCategoryKey = undefined;

        /** `#jsonFileInput` 開啟來源：`menu`=頂選單匯入；`overlayCustom`=章節內「匯入 JSON」 */
        let pendingJsonImportContext = 'menu';

        let isFlipped = false;
        let currentWord = null;
        /** 換卡自動朗讀：避免快速連按導致播到上一張單字 */
        let autoSpeakCardSeq = 0;
        /** 章節進度重置後重整卡片時略過下一次自動朗讀 */
        let suppressCardAutoSpeak = false;
        let frontKkRequestSeq = 0;
        const dictionaryPhoneticCache = new Map();

        /** 語音清單載入後重算（Chrome 等會延遲注入較自然語音） */
        let preferredEnglishVoiceCache = null;

        const stats = {
            again: 0,
            hard: 0,
            good: 0,
            easy: 0
        };

        function loadPersistedState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const o = JSON.parse(raw);
                if (o.v !== 2 || !Array.isArray(o.baselineWords) || !Array.isArray(o.wordsList)) return;
                baselineWords = o.baselineWords.map(normalizeEntry).filter(w => w.keyword);
                initialTotal = Number(o.initialTotal);
                if (initialTotal !== baselineWords.length) initialTotal = baselineWords.length;
                if (initialTotal === 0) {
                    wordsList = [];
                } else {
                    wordsList = sanitizeWordsListFromBaseline(o.wordsList, baselineWords);
                }
                currentDeckDisplayName = typeof o.deckDisplayName === 'string' ? o.deckDisplayName : '';
                deckSource = o.deckSource === 'firebase' ? 'firebase' : 'import';
                if (o.stats && typeof o.stats === 'object') {
                    stats.again = Number(o.stats.again) || 0;
                    stats.hard = Number(o.stats.hard) || 0;
                    stats.good = Number(o.stats.good) || 0;
                    stats.easy = Number(o.stats.easy) || 0;
                }
            } catch (e) {
                console.warn('讀取進度失敗', e);
            }
        }

        function persistState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    v: 2,
                    initialTotal,
                    baselineWords,
                    wordsList,
                    deckDisplayName: currentDeckDisplayName,
                    deckSource: deckSource === 'firebase' ? 'firebase' : 'import',
                    lastStudiedAt: Date.now(),
                    stats: {
                        again: stats.again,
                        hard: stats.hard,
                        good: stats.good,
                        easy: stats.easy
                    }
                }));
                if (deckSource === 'firebase' && currentDeckDisplayName) {
                    saveCloudDayProgressSnapshot(currentDeckDisplayName, baselineWords, wordsList, stats);
                }
                syncCurrentDeckToHistory();
            } catch (e) {
                console.warn('儲存進度失敗', e);
            }
        }

        /** 將目前詞表與進度寫回「同 displayName」的歷程項目（與主畫面同步）；雲端 DAY 不列入歷程 */
        function syncCurrentDeckToHistory() {
            if (deckSource === 'firebase') return;
            const name = String(currentDeckDisplayName || '').trim();
            if (!name || !baselineWords.length) return;
            let list = loadDeckHistory();
            const prev = list.find((h) => h.displayName === name);
            const mergeKeep =
                prev &&
                prev.mergedFromFirebase &&
                typeof prev.mergedFromFirebase === 'object' &&
                Array.isArray(prev.mergedFromFirebase.dayKeys)
                    ? { mergedFromFirebase: prev.mergedFromFirebase }
                    : {};
            const entry = {
                displayName: name,
                source: deckSource === 'firebase' ? 'firebase' : 'import',
                baselineWords: baselineWords.map(normalizeEntry).filter((w) => w.keyword),
                wordsList: wordsList.map(normalizeEntry).filter((w) => w.keyword),
                initialTotal,
                stats: {
                    again: stats.again,
                    hard: stats.hard,
                    good: stats.good,
                    easy: stats.easy
                },
                savedAt: Date.now(),
                ...mergeKeep,
            };
            list = list.filter((h) => h.displayName !== name);
            list.unshift(entry);
            if (list.length > DECK_HISTORY_MAX) list = list.slice(0, DECK_HISTORY_MAX);
            localStorage.setItem(DECK_HISTORY_KEY, JSON.stringify(list));
        }

        function stripJsonExtension(filename) {
            return String(filename || '').replace(/\.json$/i, '').trim();
        }

        /** 自選卡片標題顯示：略過舊資料「合併｜」前綴；localStorage 鍵仍用 item.displayName。 */
        function formatCustomDeckCardTitle(storageDisplayName) {
            const s = stripJsonExtension(String(storageDisplayName || '').trim());
            return s.replace(/^合併[｜|]\s*/, '');
        }

        /**
         * 自 displayName 還原雲端合併章節（舊資料無 mergedFromFirebase 時後援）。
         * 格式：`書名／DAY1＋DAY2` 或根層 `DAY1＋DAY2`。
         */
        function dayKeysLookLikeFirebaseMerged(dayKeys) {
            return (
                Array.isArray(dayKeys) &&
                dayKeys.length > 0 &&
                dayKeys.every(function (d) {
                    return /^DAY\d+/i.test(String(d || '').trim());
                })
            );
        }

        function parseMergedFirebaseDeckFromDisplayName(displayName) {
            let raw = stripJsonExtension(String(displayName || '').trim()).replace(/^合併[｜|]\s*/, '');
            if (!raw) return null;
            const idx = raw.indexOf('／');
            if (idx === -1) {
                if (raw.indexOf('＋') === -1) return null;
                const dayKeys = raw.split('＋').map((s) => s.trim()).filter(Boolean);
                if (!dayKeysLookLikeFirebaseMerged(dayKeys)) return null;
                return { categoryKey: '', dayKeys };
            }
            const cat = raw.slice(0, idx).trim();
            const rest = raw.slice(idx + 1);
            const dayKeys = rest.split('＋').map((s) => s.trim()).filter(Boolean);
            if (!dayKeysLookLikeFirebaseMerged(dayKeys)) return null;
            return { categoryKey: cat, dayKeys };
        }

        function getCustomDeckMergedChipsMeta(item) {
            if (
                item &&
                item.mergedFromFirebase &&
                typeof item.mergedFromFirebase === 'object' &&
                Array.isArray(item.mergedFromFirebase.dayKeys) &&
                item.mergedFromFirebase.dayKeys.length
            ) {
                return {
                    categoryKey: String(item.mergedFromFirebase.categoryKey || ''),
                    dayKeys: item.mergedFromFirebase.dayKeys.map(String),
                };
            }
            return parseMergedFirebaseDeckFromDisplayName(item.displayName);
        }

        /** 合併卡左側：簡短書名（減少字數） */
        function shortBookTitleForMergedCard(categoryKey) {
            const c = String(categoryKey || '').trim();
            if (!c) return '組合';
            if (c === FIREBASE_TOEIC_BOOK_DISPLAY_NAME) return '新制大全';
            if (c.includes('補充')) {
                if (c.includes('TOEIC') || c.includes('多益') || c.includes('單字')) return '大全補充';
            }
            if (c.length > 10) return c.slice(0, 9) + '…';
            return c;
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        /** 雲端章節頂列：第一行書名、第二行 DAY；扁平鍵僅有 DAY 時第一行用大全顯示名 */
        function parseFirebaseDeckTitleLines(displayName) {
            const t = String(displayName || '').trim();
            const sep = ' · ';
            if (!t) return { bookLine: '', dayLine: '' };
            if (t.includes(sep)) {
                const i = t.indexOf(sep);
                return {
                    bookLine: t.slice(0, i).trim(),
                    dayLine: t.slice(i + sep.length).trim()
                };
            }
            return { bookLine: FIREBASE_TOEIC_BOOK_DISPLAY_NAME, dayLine: t };
        }

        function updateDeckTitleUi() {
            const block = document.getElementById('deckTitleBlock');
            const line1 = document.getElementById('deckTitleLine1');
            const line2 = document.getElementById('deckTitleLine2');
            if (!block || !line1 || !line2) return;
            const t = currentDeckDisplayName || '';

            if (deckSource === 'firebase' && t) {
                const { bookLine, dayLine } = parseFirebaseDeckTitleLines(t);
                line1.textContent = bookLine;
                line2.textContent = dayLine;
                line1.classList.remove('hidden');
                const tip = bookLine && dayLine ? bookLine + '\n' + dayLine : t;
                block.title = tip;
                block.classList.remove('invisible');
                document.title = dayLine ? `${dayLine} — ${APP_DISPLAY_NAME}` : APP_DISPLAY_NAME;
                return;
            }

            if (deckSource === 'import' && t) {
                line1.textContent = CUSTOM_DECK_BAR_LINE;
                line2.textContent = t;
                line1.classList.remove('hidden');
                block.title = CUSTOM_DECK_BAR_LINE + '\n' + t;
                block.classList.remove('invisible');
                document.title = `${t} — ${APP_DISPLAY_NAME}`;
                return;
            }

            line1.textContent = '';
            line1.classList.add('hidden');
            line2.textContent = t;
            if (t) {
                block.title = t;
                block.classList.remove('invisible');
                document.title = `${t} — ${APP_DISPLAY_NAME}`;
            } else {
                block.removeAttribute('title');
                block.classList.add('invisible');
                document.title = APP_DISPLAY_NAME;
            }
        }

        function loadDeckHistory() {
            try {
                const raw = localStorage.getItem(DECK_HISTORY_KEY);
                if (!raw) return [];
                const arr = JSON.parse(raw);
                if (!Array.isArray(arr)) return [];
                /** 不包含雲端章節；舊資料曾寫入 source:firebase 者一併自清單與 raw 移除 */
                const list = arr.filter(
                    (x) =>
                        x && Array.isArray(x.baselineWords) && x.displayName && x.source !== 'firebase'
                );
                if (list.length !== arr.length) {
                    localStorage.setItem(DECK_HISTORY_KEY, JSON.stringify(list));
                }
                return list;
            } catch {
                return [];
            }
        }

        /** 僅將匯入內容寫入自選歷程，不載入詞卡區（須在「自選單字」點該張卡片後才開始）
         *  @param {object} [extras] 例：`{ mergedFromFirebase: { categoryKey, dayKeys } }` */
        function prependImportedDeckToHistoryFromRaw(rawEntries, displayNameRaw, extras) {
            const list = (rawEntries || []).map(normalizeEntry).filter((w) => w.keyword);
            if (!list.length) return false;
            const displayName =
                stripJsonExtension(String(displayNameRaw || '').trim()) || '詞表';
            const ext = extras && typeof extras === 'object' ? extras : {};
            let hist = loadDeckHistory();
            hist = hist.filter((h) => h.displayName !== displayName);
            hist.unshift({
                displayName,
                source: 'import',
                baselineWords: list.map(normalizeEntry).filter((w) => w.keyword),
                wordsList: list.slice(),
                initialTotal: list.length,
                stats: { again: 0, hard: 0, good: 0, easy: 0 },
                savedAt: Date.now(),
                ...ext,
            });
            if (hist.length > DECK_HISTORY_MAX) hist = hist.slice(0, DECK_HISTORY_MAX);
            try {
                localStorage.setItem(DECK_HISTORY_KEY, JSON.stringify(hist));
            } catch (e) {
                console.warn('儲存自選歷程失敗', e);
            }
            return true;
        }

        /** 重置自選詞表進度（本機 DECK_HISTORY_KEY），若為當前牌組則一併重設學習畫面 */
        function resetImportDeckChapter(displayName) {
            const name = String(displayName || '').trim();
            if (!name) return;
            if (
                !confirm(`確定要重置「${name}」的學習進度？\n此操作無法復原。`)
            ) {
                return;
            }
            let hist = loadDeckHistory();
            const idx = hist.findIndex((h) => h.displayName === name);
            if (idx === -1) return;
            const base = (hist[idx].baselineWords || []).map(normalizeEntry).filter((w) => w.keyword);
            if (!base.length) return;
            hist[idx] = {
                ...hist[idx],
                baselineWords: base,
                wordsList: base.slice(),
                initialTotal: base.length,
                stats: { again: 0, hard: 0, good: 0, easy: 0 },
                savedAt: Date.now(),
            };
            try {
                localStorage.setItem(DECK_HISTORY_KEY, JSON.stringify(hist));

                console.warn(e);

                deckSource === 'import' &&
                String(currentDeckDisplayName || '').trim() === name &&

        /** 章節選擇「自選單字」清單：歷程＋本機 STORAGE 已還原但尚未寫入歷程的匯入牌組 */
        function getCustomDeckListForPicker() {
            const list = loadDeckHistory().map((x) => ({ ...x }));
            const name = String(currentDeckDisplayName || '').trim();
            if (
                name &&
                deckSource === 'import' &&

            ) {

                    displayName: name,

                        again: stats.again,
                        hard: stats.hard,
                        good: stats.good,
                        easy: stats.easy,
                    },
                    savedAt: Date.now(),
                });

            return list;
        }

        function sanitizeWordsListFromBaseline(wl, baseline) {
            const base = (baseline || []).map(normalizeEntry).filter((w) => w.keyword);
            if (!base.length) return [];
            const allowed = new Set(base.map((w) => w.keyword));
            const raw = (wl || []).map(normalizeEntry).filter((w) => w.keyword && allowed.has(w.keyword));
            if (raw.length > 0) return raw;
            /** 空隊列＝已完成或尚未寫入 wordsList；不可還原成整副牌（否則進度條與評分會不一致） */
            const hadRows = Array.isArray(wl) && wl.length > 0;
            return hadRows ? base.slice() : [];
        }

        function getImportDeckCardInfo(entry) {
            const base = (entry.baselineWords || []).map(normalizeEntry).filter((w) => w.keyword);
            const denom = Math.max(base.length, 1);
            const wl =
                entry.stats &&
                typeof entry.stats === 'object' &&
                Array.isArray(entry.wordsList)
                    ? sanitizeWordsListFromBaseline(entry.wordsList, base)
                    : base.slice();
            const remaining = wl.length;
            const st = entry.stats && typeof entry.stats === 'object' ? entry.stats : {};
            /** 卡片「進度」與詞條佇列脫钩：一律以本機 stats.easy／總詞數呈現（Firebase 只提供詞，不紀錄進度） */
            const easyN = Math.max(0, Number(st.easy) || 0);
            const doneDisplay = Math.min(denom, easyN);
            const ratingCount =
                (Number(st.again) || 0) +
                (Number(st.hard) || 0) +
                (Number(st.good) || 0) +
                easyN;
            const pct = Math.min(100, Math.max(0, Math.round((doneDisplay / denom) * 100)));
            let lastLine = '尚未開始';
            const queueFinished = remaining === 0 && base.length > 0;
            if (easyN >= denom || queueFinished) {
                lastLine = '已完成本章';
            } else if (remaining > 0 && ratingCount === 0) {
                lastLine = '尚未開始';
            } else if (remaining > 0 && wl[0]) {
                lastLine = String(wl[0].keyword ?? '').trim() || '⋯';
            }
            return {
                pct,
                progressLine: doneDisplay + ' / ' + denom,
                lastLine,
            };
        }

        /** 主畫面「最近學習」僅顯示已開打或已完成的紀錄（排除純「尚未開始」）。 */
        function welcomeRecentActivityQualifies(entry) {
            return getImportDeckCardInfo(entry).lastLine !== '尚未開始';
        }

        /** 主畫面分組用：回傳穩定 groupKey 與標題列文字（大分類單獨一行，不寫進卡片內）。 */
        function getWelcomeDeckGroupMetaForItem(item) {
            if (item && item.__homeFirebaseResume === true) {
                const pk = parseFirebaseCloudProgressStorageKey(item.displayName);
                const cat = pk && pk.catPrefix ? String(pk.catPrefix).trim() : '';
                /** 無 `書名 · DAY` 前綴的舊鍵：與章節選單預設大全名合併為同一區（避免出現「雲端章節」）。 */
                const label = cat || FIREBASE_TOEIC_BOOK_DISPLAY_NAME;
                return {
                    groupKey: 'fb:' + label,
                    groupLabelLine: label,
                };
            }
            const mm = getCustomDeckMergedChipsMeta(item);
            if (mm && mm.dayKeys.length) {
                const line =
                    mm.categoryKey && String(mm.categoryKey).trim()
                        ? String(mm.categoryKey).trim()
                        : '自選合併';
                return {
                    groupKey: 'merged:' + line,
                    groupLabelLine: line,
                };
            }
            return {
                groupKey: 'local:custom',
                groupLabelLine: CUSTOM_DECK_BAR_LINE,
            };
        }

        function buildWelcomeRecentGroupedBuckets(rows) {
            const m = new Map();
            rows.forEach(function (row) {
                const meta = getWelcomeDeckGroupMetaForItem(row.item);
                const key = meta.groupKey;
                if (!m.has(key)) {
                    m.set(key, {
                        groupLabelLine: meta.groupLabelLine,
                        maxSavedAt: 0,
                        rows: [],
                    });
                }
                const b = m.get(key);
                b.rows.push(row);
                b.maxSavedAt = Math.max(b.maxSavedAt, Number(row.savedAt) || 0);
            });
            const buckets = Array.from(m.values());
            buckets.forEach(function (b) {
                b.rows.sort(function (a, c) {
                    return (Number(c.savedAt) || 0) - (Number(a.savedAt) || 0);
                });
            });
            buckets.sort(function (a, b) {
                return b.maxSavedAt - a.maxSavedAt;
            });
            return buckets;
        }

        function applyDeckHistoryItemInner(item) {
            const base = (item.baselineWords || []).map(normalizeEntry).filter((w) => w.keyword);
            if (!base.length) return false;

                typeof item.stats === 'object' &&

                stats.again = Number(item.stats.again) || 0;
                stats.hard = Number(item.stats.hard) || 0;
                stats.good = Number(item.stats.good) || 0;
                stats.easy = Number(item.stats.easy) || 0;
            } else {
                wordsList = baselineWords.slice();
                stats.again = stats.hard = stats.good = stats.easy = 0;

        /**
         * 以「舊隊列順序」接回新 baseline（例句／片語以雲端最新為準）；新單字接在隊列末尾。
         */
        function mergeWordsQueueWithNewBaseline(savedWl, newBaseline) {
            const byKw = new Map(newBaseline.map((w) => [w.keyword, w]));
            const allowed = new Set(newBaseline.map((w) => w.keyword));
            const saved = (savedWl || []).map(normalizeEntry).filter((w) => w.keyword && allowed.has(w.keyword));
            const merged = saved.map((w) => byKw.get(w.keyword) || w);
            const inQueue = new Set(merged.map((w) => w.keyword));
            for (const w of newBaseline) {
                if (!inQueue.has(w.keyword)) {
                    merged.push(w);
                    inQueue.add(w.keyword);
                }
            }
            return merged.length ? merged : newBaseline.slice();
        }

        function countEntriesInFirebaseDayNode(dayNode) {
            if (!dayNode || typeof dayNode !== 'object') return 0;
            return extractEntriesFromUnknownJson(dayNode).filter((e) => String(e.keyword ?? e.word ?? '').trim()).length;
        }

        /**
         * 章節選擇格子：本機 Easy 次數／總詞數、百分比、佇列最前單字（下一張）。
         */
        function getCloudChapterPickerInfo(dayKey, dayNode, cloudMap, firebaseCategoryPrefix) {
            const catPrefix =
                firebaseCategoryPrefix === undefined || firebaseCategoryPrefix === null
                    ? ''
                    : String(firebaseCategoryPrefix);
            const progressKey = firebaseCloudProgressStorageKey(catPrefix, dayKey);
            const totalLive = countEntriesInFirebaseDayNode(dayNode);
            const snapCloud =
                cloudMap &&
                typeof cloudMap === 'object' &&
                cloudMap[progressKey] &&
                typeof cloudMap[progressKey] === 'object'
                    ? cloudMap[progressKey]
                    : null;
            const snap = pickBetterFirebaseProgressSnap(
                snapCloud,
                readStorageFirebaseSnapshotForKey(progressKey),
                null
            );
            if (!snap || !Array.isArray(snap.wordsList) || !Array.isArray(snap.baselineWords)) {
                const n = Math.max(0, totalLive);
                return {
                    pct: 0,
                    progressLine: n > 0 ? '0 / ' + n : '0 / 0',
                    lastLine: '尚未開始',
                    lastKw: '',
                };
            }
            const baseArr = snap.baselineWords.map(normalizeEntry).filter((w) => w.keyword);
            const wlSanitized = sanitizeWordsListFromBaseline(snap.wordsList, baseArr);
            const remaining = wlSanitized.length;
            const baseLen = baseArr.length;
            const denom = Math.max(totalLive || 0, baseLen || 0, 1);
            const st = snap.stats && typeof snap.stats === 'object' ? snap.stats : {};
            const easyN = Math.max(0, Number(st.easy) || 0);
            const doneDisplay = Math.min(denom, easyN);
            const ratingCount =
                (Number(st.again) || 0) +
                (Number(st.hard) || 0) +
                (Number(st.good) || 0) +
                easyN;
            const pct = Math.min(100, Math.max(0, Math.round((doneDisplay / denom) * 100)));
            let lastLine = '尚未開始';
            let lastKw = '';
            const queueFinished = remaining === 0 && baseLen > 0;
            if (easyN >= denom || queueFinished) {
                lastLine = '已完成本章';
            } else if (remaining > 0 && ratingCount === 0) {
                /** 與無快照／重製後一致；但一旦打過任一評分就不再顯示「尚未開始」 */
                lastLine = '尚未開始';
                lastKw = '';
            } else if (remaining > 0) {
                const w0 = wlSanitized[0];
                lastKw = w0 && typeof w0 === 'object' ? String(w0.keyword ?? w0.word ?? '').trim() : '';
                lastLine = lastKw || '⋯';
            }
            return {
                pct,
                progressLine: doneDisplay + ' / ' + denom,
                lastLine,
                lastKw,
            };
        }

        /** 首頁／未進入學習區時強制將底部評分統計顯示為零（不比對記憶體 stats） */

        function scoreVoiceForEnglish(v) {
            const lang = (v.lang || '').toLowerCase().replace('_', '-');
            if (!/^en/i.test(lang)) return -1e6;
            const name = (v.name || '').toLowerCase();
            let s = 0;
            if (lang === 'en-us' || lang.startsWith('en-us')) s += 40;
            else if (lang.startsWith('en-gb')) s += 28;
            else if (lang.startsWith('en')) s += 20;
            if (/natural|neural|premium|enhanced|wavenet|polyglot|expressive|generative/.test(name)) s += 120;
            if (/google\s+/.test(name) && /english/.test(name)) s += 70;
            if (/microsoft\s+/.test(name) && /(natural|neural|online)/.test(name)) s += 75;
            if (/microsoft\s+(jenny|aria|guy|davis|jane|sonia|ryan|andrew|emma|brian|michelle)\b/.test(name)) s += 55;
            if (/samantha|allison|victoria|aaron|nicky|susan|daniel|karen|moira|fiona|tessa/.test(name)) s += 45;
            if (/apple\s+/.test(name)) s += 35;
            if (!v.localService && /google|microsoft/.test(name)) s += 15;
            if (/compact|low\s*quality|basic/.test(name)) s -= 80;
            if (/^microsoft\s+mark\b|^microsoft\s+zira\b|^microsoft\s+david\b/.test(name)) s -= 25;
            return s;
        }

        function getPreferredEnglishVoice() {
            if (!('speechSynthesis' in window)) return null;
            const voices = window.speechSynthesis.getVoices();
            if (!voices.length) return preferredEnglishVoiceCache;
            let best = null;
            let bestScore = -Infinity;
            for (const v of voices) {
                const sc = scoreVoiceForEnglish(v);
                if (sc > bestScore) {
                    bestScore = sc;
                    best = v;
                }
            }
            if (best && bestScore > -5e5) {
                preferredEnglishVoiceCache = best;
                return best;
            }
            preferredEnglishVoiceCache = voices.find((x) => /^en/i.test(x.lang)) || null;
            return preferredEnglishVoiceCache;
        }

        function playAudio(text, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!('speechSynthesis' in window)) {
                console.warn('此瀏覽器不支援語音合成功能');
                return;
            }
            const t = String(text || '').trim();
            if (!t) return;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(t);
            const voice = getPreferredEnglishVoice();
            if (voice) {
                utterance.voice = voice;
                utterance.lang = voice.lang || 'en-US';
            } else {
                utterance.lang = 'en-US';
            }
            utterance.rate = t.length > 140 ? 0.96 : 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            window.speechSynthesis.speak(utterance);
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.addEventListener('voiceschanged', () => {
                preferredEnglishVoiceCache = null;
            });
            window.speechSynthesis.getVoices();
        }

        /** 與 Test.html 一致：keyword 清理與拼字比對 */
        function cleanKeyword(s) {
            return String(s || '').replace(/\*+/g, '').trim();
        }

        function normalizeForSpell(s) {
            /* 先去掉重音再比對：一般鍵盤不易輸入 é 等，打 e 應視為正確 */
            const base = stripDiacritics(String(s || ''));
            return base
                .trim()
                .toLowerCase()
                .replace(/[\u2019']/g, "'")
                .replace(/[^a-z0-9'\- ]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function shuffleArray(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        let quizQueue = [];
        let quizIndex = 0;
        let quizPhase = 'idle';
        let quizCurrentKeyword = '';

        function isQuizOpen() {
            const el = document.getElementById('quizOverlay');
            return el && !el.classList.contains('hidden');

        function wireQuizMidCells(cells) {
            cells.forEach((cell, j) => {
                cell.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !cell.value) {
                        if (j > 0) {
                            cells[j - 1].focus();
                            cells[j - 1].select();
                        }
                        e.preventDefault();
                        return;
                    }
                    if (e.key === 'ArrowLeft' && j > 0) {
                        cells[j - 1].focus();
                        e.preventDefault();
                    }
                    if (e.key === 'ArrowRight' && j < cells.length - 1) {
                        cells[j + 1].focus();
                        e.preventDefault();
                    }
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        submitQuizAnswer();
                    }
                });
                cell.addEventListener('input', () => {
                    let v = cell.value;
                    if (v.length > 1) {
                        const extra = v.slice(1);
                        v = v.charAt(0);
                        cell.value = v;
                        for (let k = 0; k < extra.length && j + 1 + k < cells.length; k++) {
                            cells[j + 1 + k].value = extra.charAt(k);
                        }
                        const lastIdx = Math.min(j + extra.length, cells.length - 1);
                        cells[lastIdx].focus();
                    } else if (cell.value && j < cells.length - 1) {
                        cells[j + 1].focus();
                    }
                });
                cell.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const t = (e.clipboardData || window.clipboardData).getData('text') || '';
                    const chars = Array.from(t);
                    let cj = j;
                    for (let p = 0; p < chars.length && cj < cells.length; p++, cj++) {
                        cells[cj].value = chars[p];
                    }
                    if (cj <= cells.length - 1) cells[cj].focus();
                    else cells[cells.length - 1].focus();
                });
            });
        }

        function renderQuizWordArea(keyword) {
            const host = document.getElementById('quizWordHost');
            host.innerHTML = '';
            const kw = cleanKeyword(keyword);
            const chars = Array.from(kw);
            const wrap = document.createElement('div');
            wrap.className = 'quiz-spell-row max-w-full px-1';

            if (chars.length <= 2) {
                const inp = document.createElement('input');
                inp.type = 'text';
                inp.id = 'quizFullInput';
                inp.className = 'w-full max-w-full font-bold text-indigo-900 text-center leading-tight tracking-tight bg-transparent border-0 border-b-2 border-indigo-200/90 outline-none focus:border-indigo-500 rounded-none px-2 py-2 min-w-0';
                inp.style.fontSize = 'clamp(2rem, 12vmin, 4rem)';
                inp.setAttribute('autocomplete', 'off');
                inp.setAttribute('spellcheck', 'false');
                inp.setAttribute('autocapitalize', 'off');
                inp.setAttribute('autocorrect', 'off');
                wrap.appendChild(inp);
                inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        submitQuizAnswer();
                    }
                });
                host.appendChild(wrap);
                setTimeout(() => inp.focus(), 120);
                return;
            }

            const first = document.createElement('span');
            first.className = 'quiz-edge-char select-none';
            first.textContent = chars[0];
            wrap.appendChild(first);

            const midCells = [];
            for (let i = 1; i < chars.length - 1; i++) {
                const inp = document.createElement('input');
                inp.type = 'text';
                inp.maxLength = 1;
                inp.className = 'quiz-mid-cell';
                inp.setAttribute('autocomplete', 'off');
                inp.setAttribute('spellcheck', 'false');
                inp.setAttribute('autocapitalize', 'off');
                inp.setAttribute('autocorrect', 'off');
                wrap.appendChild(inp);
                midCells.push(inp);

        function stripSlashPadding(s) {
            return String(s || '')
                .trim()
                .replace(/^\/*/, '')
                .replace(/\/*$/, '')
                .trim();
        }

        function stripDiacritics(s) {
            try {
                return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            } catch {
                return String(s);
            }
        }

        function formatSlashPhonetic(inner) {
            const c = stripSlashPadding(inner);
            return c ? `/${c}/` : '';
        }

        /** 從 API 回傳的 entries 陣列中找出第一段可用音標（多義詞時不只看第一筆） */
        function extractPhoneticFromApiArray(arr) {
            if (!Array.isArray(arr)) return '';
            for (const entry of arr) {
                if (!entry || typeof entry !== 'object') continue;
                const ph = entry.phonetics;
                if (Array.isArray(ph)) {
                    for (const p of ph) {
                        const tx = p && String(p.text || '').trim();
                        if (tx) return tx;
                    }
                }
                const top = entry.phonetic && String(entry.phonetic).trim();
                if (top) return top;
            }
            return '';
        }

        async function fetchDictionaryEntriesJson(query) {
            const q = String(query || '').trim();
            if (!q) return null;
            const r = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(q));
            if (!r.ok) return null;
            const data = await r.json();
            return Array.isArray(data) ? data : null;
        }

        async function fetchDictionaryPhonetic(word) {
            const w = String(word || '').trim();
            if (!w) return '';
            const cacheKey = w.toLowerCase();
            if (dictionaryPhoneticCache.has(cacheKey)) return dictionaryPhoneticCache.get(cacheKey);

            const variants = [];
            const add = (x) => {
                const v = String(x || '').trim();
                if (v && !variants.includes(v)) variants.push(v);
            };
            add(w);
            add(stripDiacritics(w));
            const firstTok = w.split(/\s+/)[0];
            add(firstTok);

            let out = '';
            try {
                for (const q of variants) {
                    const arr = await fetchDictionaryEntriesJson(q);
                    if (!arr || !arr.length) continue;
                    const text = extractPhoneticFromApiArray(arr);
                    if (text) {
                        out = stripSlashPadding(text);
                        break;
                    }
                }
            } catch {
                out = '';
            }
            dictionaryPhoneticCache.set(cacheKey, out);
            return out;
        }

        function prefetchPhoneticsForQueue() {
            for (let i = 1; i <= 12; i++) {
                if (!wordsList[i]) break;
                const w = wordsList[i].keyword;
                if (!w || (wordsList[i].kk || '').trim()) continue;
                const key = w.toLowerCase();
                if (dictionaryPhoneticCache.has(key)) continue;
                fetchDictionaryPhonetic(w).catch(() => {});
            }
        }

        function handleRating(rating, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }

            if (!studyBoardVisible) return;

            if (wordsList.length === 0) return;

            const card = wordsList.shift();
            
            switch(rating) {
                case 'again':
                    stats.again++;
                    wordsList.splice(1, 0, card);
                    break;
                case 'hard':
                    stats.hard++;
                    const hardIndex = Math.min(wordsList.length, Math.floor(Math.random() * 3) + 2);
                    wordsList.splice(hardIndex, 0, card);
                    break;
                case 'good':
                    stats.good++;
                    const goodIndex = Math.floor(wordsList.length * 0.75);
                    wordsList.splice(goodIndex, 0, card);
                    break;
                case 'easy':
                    stats.easy++;
                    break;
            }

            document.getElementById('statAgain').innerText = stats.again;
            document.getElementById('statHard').innerText = stats.hard;
            document.getElementById('statGood').innerText = stats.good;
            document.getElementById('statEasy').innerText = stats.easy;

            persistState();

            resetFlip();
            setTimeout(() => {
                renderCard();
            }, 150);
        }

        function makeMultiFileDeckDisplayName(files) {

                .map((f) => stripJsonExtension(f.name))

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(new Error('read'));
                reader.readAsText(file, 'UTF-8');
            });
        }

        /**
         * 複選多個 JSON：依檔案順序合併條目後僅寫入自選歷程；使用者須在「自選單字」點該卡片才進入學習。
         * 若在章節內「匯入 JSON」呼叫，則留在自選面板並重新整理列表。
         */
        async function importJsonFiles(fileList) {
            const files = Array.from(fileList || []).filter(Boolean);
            if (!files.length) return;
            const importUi = pendingJsonImportContext;
            pendingJsonImportContext = 'menu';

            const multi = files.length > 1;
            const seenKw = new Set();
            const mergedRaw = [];
            const errors = [];

            for (const file of files) {
                try {
                    const text = await readFileAsText(file);
                    const data = JSON.parse(text);
                    const raw = extractEntriesFromUnknownJson(data);
                    if (!raw.length) {
                        errors.push(`「${file.name}」：讀不到單字`);
                        continue;
                    }
                    for (const e of raw) {
                        const k = String(e.keyword ?? e.word ?? '').trim();
                        if (!k) continue;
                        if (multi) {
                            const key = k.toLowerCase();
                            if (seenKw.has(key)) continue;
                            seenKw.add(key);
                        }
                        mergedRaw.push(e);
                    }
                } catch (err) {
                    const msg = err instanceof SyntaxError ? 'JSON 格式無效' : '無法讀取檔案';
                    errors.push(`「${file.name}」：${msg}`);
                }
            }

            if (!mergedRaw.length) {
                alert(
                    errors.length
                        ? errors.join('\n')
                        : '沒有可匯入的單字。請使用 extract.results[].entries、extracts[].results[].entries（或 words、entries 陣列）等結構，且項目需含 keyword 或 word。'
                );
                return;
            }

            const displayName = files.length === 1 ? files[0].name : makeMultiFileDeckDisplayName(files);
            prependImportedDeckToHistoryFromRaw(mergedRaw, displayName);

            closeMenu();
            if (importUi !== 'overlayCustom') {
                const ov = document.getElementById('dayPickOverlay');
                if (ov) {
                    prepareDayPickSourceStep();
                    ov.classList.remove('hidden');
                    openCustomWordListPanel();
                }
            }
            refreshCustomDeckPickRelatedGrids();

            if (errors.length) {
                alert('以下檔案未併入（其餘已成功加入自選列表）：\n' + errors.join('\n'));
            }
        }

            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                advanceQuiz();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (isQuizOpen()) {
                    closeQuiz();
                    e.preventDefault();
                    return;
                }
                if (isDayPickOpen()) {
                    goDayPickBack();
                    e.preventDefault();
                    return;
                }
                closeMenu();
                return;
            }
            if (isQuizOpen()) {
                return;
            }
            if (!studyBoardVisible) {
                return;
            }
            if (isFlipped) {
                if (e.key === '1') handleRating('again');
                if (e.key === '2') handleRating('hard');
                if (e.key === '3') handleRating('good');
                if (e.key === '4') handleRating('easy');
            }
            if (e.key === ' ' || e.key === 'Enter') {
                toggleFlip();
                e.preventDefault();
            }
        });

        document.addEventListener('wheel', (e) => {
            if (e.ctrlKey) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
        }, { passive: false });
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        }, true);

        loadPersistedState();
        studyBoardVisible = false;
        refreshStudyChrome();
        prefetchFirebaseChapterCatalog();

    </script>
</body>
</html>
