<!DOCTYPE html>
<html lang="zh-TW" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
    <title>單字學習卡</title>
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-title" content="單字學習卡">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <!-- 引入 Tailwind CSS 進行快速切版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 作為圖示 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* 禁止選取字樣、長按選單；縮放主要由 viewport + 下方 JS 輔助 */
        html {
            height: 100%;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body {
            height: 100%;
            max-height: 100vh;
            overflow: hidden;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        @supports (height: 100dvh) {
            body {
                max-height: 100dvh;
            }
        }
        .app-root {
            box-sizing: border-box;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding-left: max(0.75rem, env(safe-area-inset-left, 0px));
            padding-right: max(0.75rem, env(safe-area-inset-right, 0px));
            padding-top: max(0.5rem, env(safe-area-inset-top, 0px));
            padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px));
        }
        @supports (height: 100dvh) {
            .app-root {
                height: 100dvh;
                max-height: 100dvh;
            }
        }
        /* 翻轉卡片 */
        .perspective {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 卡片舞台：吃掉剩餘高度，供內層 absolute 填滿 */
        .card-stage {
            flex: 1 1 0;
            min-height: 0;
            width: 100%;
        }
    </style>
</head>
<body class="h-full max-h-full overflow-hidden bg-slate-50 font-sans text-slate-800 antialiased touch-manipulation select-none">

    <div class="app-root relative w-full max-w-md mx-auto min-h-0">
    <!-- 選單：獨立最頂一列，不與卡片內進度條同一行 -->
    <div id="menuToolbar" class="relative z-[60] shrink-0 w-full min-h-[2.75rem] py-1">
        <div class="grid grid-cols-[minmax(0,auto)_1fr_minmax(0,auto)] items-center gap-2 w-full">

            <span id="deckTitleText" class="min-w-0 text-center text-sm sm:text-base font-semibold text-slate-700 truncate px-1 invisible" title=""></span>
            <span class="w-10 sm:w-11 shrink-0 justify-self-end" aria-hidden="true"></span>
        </div>
        <input type="file" id="jsonFileInput" accept=".json,application/json" class="hidden" aria-hidden="true">
        <nav id="appMenuPanel" class="hidden absolute left-0 top-full mt-1 z-[60] w-[min(100vw-2rem,16rem)] max-h-[min(70vh,24rem)] overflow-y-auto touch-pan-y rounded-xl border border-slate-200 bg-white py-1 shadow-xl" role="menu" aria-label="選單">

            </div>

            <div id="deckCompleteScreen" class="hidden absolute inset-0 z-40 bg-white rounded-2xl flex flex-col min-h-0 overflow-hidden border border-slate-100">
                <div class="shrink-0 w-full flex items-center gap-2 sm:gap-3 px-3 sm:px-5 pt-3 pb-2 border-b border-slate-100">
                    <div class="flex-1 min-w-0 bg-slate-200 rounded-full h-1.5 sm:h-2">

            <div id="flipCardRoot" class="hidden absolute inset-0 z-10 transition-transform duration-500 preserve-3d">
            <!-- 卡片正面：頂部進度條 → 單字與朗讀置中 -->
            <div id="frontFace" class="absolute inset-0 backface-hidden bg-white rounded-2xl flex flex-col min-h-0 h-full overflow-hidden p-3 sm:p-5 border border-slate-100 cursor-pointer transition-all duration-300" onclick="toggleFlip()">
                <div class="shrink-0 w-full flex items-center gap-2 sm:gap-3 px-0.5 pt-0 pb-2 sm:pb-3" onclick="event.stopPropagation()">
                    <div class="flex-1 min-w-0 bg-slate-200 rounded-full h-1.5 sm:h-2">
                        <div id="progressBar" class="bg-slate-800 h-full rounded-full transition-all duration-500" style="width: 10%"></div>
                    </div>
                    <span id="progressText" class="shrink-0 text-[10px] sm:text-xs font-bold text-slate-400 tabular-nums tracking-widest">1/10</span>
                </div>
                <div class="flex-1 min-h-0 flex flex-col items-center justify-center gap-3 sm:gap-5 px-2 sm:px-4">

                    <p id="frontKk" class="hidden max-w-full shrink-0 text-center font-normal text-slate-500 tabular-nums tracking-wide px-1 min-h-[1.35em]" style="font-size: clamp(0.9rem, 3.8vmin, 1.2rem);" lang="en"></p>

                        <i class="ph-fill ph-speaker-high text-4xl sm:text-5xl"></i>
                    </button>
                </div>
            </div>

            <!-- 卡片背面：僅內文區可捲動，按鈕永遠貼底可點 -->
            <div id="backFace" class="absolute inset-0 backface-hidden bg-white rounded-2xl rotate-y-180 border border-slate-100 flex flex-col min-h-0 overflow-hidden pointer-events-none transition-all duration-300 z-20">
                <div class="flex-1 min-h-0 flex flex-col overflow-hidden p-4 sm:p-5">
                    <div class="shrink-0 border-b border-slate-100 pb-3 mb-3 relative cursor-pointer" onclick="toggleFlip()">

                        <button type="button" onclick="playAudio(currentWord.keyword, event)" class="absolute top-0 right-0 text-slate-400 hover:text-indigo-500 transition-colors p-2 z-10" title="朗讀單字">

                    <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain touch-pan-y no-scrollbar space-y-3 sm:space-y-4 cursor-pointer" onclick="toggleFlip()">
                        <div id="synonymsContainer" class="hidden">
                            <h3 class="text-xs sm:text-sm font-bold text-slate-400 mb-1 uppercase tracking-wider">同義詞</h3>
                            <p id="synonymsText" class="text-slate-700 text-sm sm:text-base leading-relaxed"></p>
                        </div>

                        <div id="phrasesContainer" class="hidden">
                            <h3 class="text-xs sm:text-sm font-bold text-slate-400 mb-1 uppercase tracking-wider">常用片語</h3>
                            <ul id="phrasesList" class="list-disc pl-5 sm:pl-6 text-slate-700 space-y-1 text-sm sm:text-base leading-relaxed"></ul>
                        </div>

                        <div id="examplesContainer" class="hidden">
                            <h3 class="text-xs sm:text-sm font-bold text-slate-400 mb-2 uppercase tracking-wider">例句</h3>
                            <div id="examplesList" class="space-y-3 sm:space-y-4"></div>
                        </div>
                    </div>
                </div>

                <div class="shrink-0 border-t border-slate-100 bg-white p-3 sm:p-4 pt-3 grid grid-cols-4 gap-2 sm:gap-3">
                    <button type="button" onclick="handleRating('again', event)" class="bg-rose-50 active:bg-rose-100 text-rose-600 font-bold min-h-[3rem] sm:min-h-[3.5rem] py-3 sm:py-3.5 rounded-xl sm:rounded-2xl text-sm sm:text-base transition-colors flex items-center justify-center tracking-wide">
                        Again

                        Good
                    </button>
                    <button type="button" onclick="handleRating('easy', event)" class="bg-blue-50 active:bg-blue-100 text-blue-600 font-bold min-h-[3rem] sm:min-h-[3.5rem] py-3 sm:py-3.5 rounded-xl sm:rounded-2xl text-sm sm:text-base transition-colors flex items-center justify-center tracking-wide">

    <!-- 底部統計：固定高度列，不與卡片搶 flex -->
    <footer class="shrink-0 w-full flex justify-around items-center pt-2 pb-1 gap-1">

            <span id="statAgain" class="text-slate-600 font-medium text-sm sm:text-base tabular-nums">0</span>
        </div>
        <div class="flex flex-col items-center min-w-0">
            <span class="text-[9px] sm:text-[10px] text-orange-500 font-bold uppercase tracking-wider">Hard</span>
            <span id="statHard" class="text-slate-600 font-medium text-sm sm:text-base tabular-nums">0</span>
        </div>
        <div class="flex flex-col items-center min-w-0">
            <span class="text-[9px] sm:text-[10px] text-teal-500 font-bold uppercase tracking-wider">Good</span>
            <span id="statGood" class="text-slate-600 font-medium text-sm sm:text-base tabular-nums">0</span>
        </div>
        <div class="flex flex-col items-center min-w-0">
            <span class="text-[9px] sm:text-[10px] text-blue-500 font-bold uppercase tracking-wider">Easy</span>
            <span id="statEasy" class="text-slate-600 font-medium text-sm sm:text-base tabular-nums">0</span>
        </div>
    </footer>

    </div>

    <script>
        const rawJsonData = { extract: { results: [] } };

        const STORAGE_KEY = 'toeic-flashcard-v2';
        const DECK_HISTORY_KEY = 'toeic-deck-history-v1';
        const DECK_HISTORY_MAX = 15;

        function flattenExtract(data) {
            if (!data || typeof data !== 'object') return [];
            const ext = data.extract || data;
            const results = ext.results;
            if (!Array.isArray(results)) return [];
            return results.flatMap(r => (Array.isArray(r?.entries) ? r.entries : []));
        }

        function extractEntriesFromUnknownJson(data) {
            if (!data) return [];
            const fromExtract = flattenExtract(data);
            if (fromExtract.length) return fromExtract;
            if (Array.isArray(data.extract?.entries)) return data.extract.entries;
            if (Array.isArray(data)) {
                if (data.length && typeof data[0] === 'object' && (data[0].keyword != null || data[0].word != null)) return data;
                return [];
            }
            if (Array.isArray(data.words)) return data.words;
            if (Array.isArray(data.entries)) return data.entries;
            return [];
        }

        function normalizeExample(ex) {
            if (typeof ex === 'string') return { en: ex.trim(), zh: '' };
            if (!ex || typeof ex !== 'object') return { en: '', zh: '' };
            return {
                en: String(ex.en ?? ex.text ?? '').trim(),
                zh: String(ex.zh ?? ex.translation ?? '').trim(),
            };
        }

        function normalizePhrase(p) {
            if (typeof p === 'string') return { en: p.trim(), zh: '' };
            if (!p || typeof p !== 'object') return { en: '', zh: '' };
            return { en: String(p.en ?? '').trim(), zh: String(p.zh ?? '').trim() };
        }

        function normalizeEntry(e) {
            const keyword = String(e.keyword ?? e.word ?? '').trim();
            const kk = String(
                e.kk ?? e.kk_phonetic ?? e.phonetic_kk ?? e.phoneticKK ?? e.kkPhonetic ?? ''
            ).trim();
            return {
                keyword,
                kk,
                pos: String(e.pos ?? e.partOfSpeech ?? '').trim() || '—',
                synonyms: Array.isArray(e.synonyms) ? e.synonyms.map(s => String(s).trim()).filter(Boolean) : [],
                zh_gloss: String(e.zh_gloss ?? e.zhGloss ?? e.gloss ?? e.zh ?? '').trim(),
                examples: Array.isArray(e.examples) ? e.examples.map(normalizeExample).filter(x => x.en) : [],
                phrases: Array.isArray(e.phrases) ? e.phrases.map(normalizePhrase).filter(x => x.en || x.zh) : [],
            };
        }

        function buildWordsFromData(data) {
            return extractEntriesFromUnknownJson(data).map(normalizeEntry).filter(w => w.keyword);
        }

        let baselineWords = buildWordsFromData(rawJsonData);
        let initialTotal = baselineWords.length;
        let wordsList = baselineWords.slice();
        let currentDeckDisplayName = '';

        let isFlipped = false;
        let currentWord = null;
        /** 換卡自動朗讀：避免快速連按導致播到上一張單字 */
        let autoSpeakCardSeq = 0;
        let frontKkRequestSeq = 0;
        const dictionaryPhoneticCache = new Map();

        /** 語音清單載入後重算（Chrome 等會延遲注入較自然語音） */
        let preferredEnglishVoiceCache = null;

        const stats = {
            again: 0,
            hard: 0,
            good: 0,
            easy: 0
        };

        function loadPersistedState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const o = JSON.parse(raw);
                if (o.v !== 2 || !Array.isArray(o.baselineWords) || !Array.isArray(o.wordsList)) return;
                baselineWords = o.baselineWords.map(normalizeEntry).filter(w => w.keyword);
                initialTotal = Number(o.initialTotal);
                if (initialTotal !== baselineWords.length) initialTotal = baselineWords.length;
                if (initialTotal === 0) {
                    wordsList = [];
                } else {
                    wordsList = o.wordsList.map(normalizeEntry).filter(w => w.keyword);
                }
                currentDeckDisplayName = typeof o.deckDisplayName === 'string' ? o.deckDisplayName : '';
                if (o.stats && typeof o.stats === 'object') {
                    stats.again = Number(o.stats.again) || 0;
                    stats.hard = Number(o.stats.hard) || 0;
                    stats.good = Number(o.stats.good) || 0;
                    stats.easy = Number(o.stats.easy) || 0;
                }
            } catch (e) {
                console.warn('讀取進度失敗', e);
            }
        }

        function persistState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    v: 2,
                    initialTotal,
                    baselineWords,
                    wordsList,
                    deckDisplayName: currentDeckDisplayName,
                    stats: {
                        again: stats.again,
                        hard: stats.hard,
                        good: stats.good,
                        easy: stats.easy
                    }
                }));
            } catch (e) {
                console.warn('儲存進度失敗', e);
            }
        }

        function stripJsonExtension(filename) {
            return String(filename || '').replace(/\.json$/i, '').trim();
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function updateDeckTitleUi() {
            const el = document.getElementById('deckTitleText');
            if (!el) return;
            const t = currentDeckDisplayName || '';
            el.textContent = t;
            el.title = t;
            el.classList.toggle('invisible', !t);
            document.title = t ? `${t} — 單字學習卡` : '單字學習卡';
        }

        function loadDeckHistory() {
            try {
                const raw = localStorage.getItem(DECK_HISTORY_KEY);
                if (!raw) return [];
                const arr = JSON.parse(raw);
                if (!Array.isArray(arr)) return [];
                return arr.filter((x) => x && Array.isArray(x.baselineWords) && x.displayName);
            } catch {
                return [];
            }
        }

        function saveDeckToHistory(displayLabel, baselineArr) {
            const name = stripJsonExtension(displayLabel) || '詞表';
            const entry = {
                displayName: name,
                baselineWords: baselineArr.map((w) => normalizeEntry(w)).filter((w) => w.keyword),
                savedAt: Date.now(),
            };
            if (!entry.baselineWords.length) return;
            let list = loadDeckHistory().filter((h) => h.displayName !== name);
            list.unshift(entry);
            if (list.length > DECK_HISTORY_MAX) list = list.slice(0, DECK_HISTORY_MAX);
            localStorage.setItem(DECK_HISTORY_KEY, JSON.stringify(list));
            renderDeckHistoryMenu();
        }

        function renderDeckHistoryMenu() {
            const section = document.getElementById('deckHistorySection');
            const container = document.getElementById('deckHistoryList');
            if (!section || !container) return;
            container.innerHTML = '';
            const list = loadDeckHistory();
            if (!list.length) {
                section.classList.add('hidden');
                return;
            }
            section.classList.remove('hidden');
            list.forEach((item) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.role = 'menuitem';
                btn.className = 'w-full px-4 py-2.5 text-left hover:bg-slate-50 active:bg-slate-100 border-b border-slate-50 last:border-b-0';
                btn.innerHTML = `<span class="block text-sm font-medium text-slate-800 truncate">${escapeHtml(item.displayName)}</span><span class="block text-[11px] text-slate-400 mt-0.5">復原此詞表（進度重設）</span>`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    restoreDeckFromHistory(item);
                });
                container.appendChild(btn);
            });
        }

        function restoreDeckFromHistory(item) {
            const list = (item.baselineWords || []).map(normalizeEntry).filter((w) => w.keyword);
            if (!list.length) {
                alert('此紀錄沒有單字資料。');
                return;
            }
            if (!confirm(`復原詞表「${item.displayName}」並重設學習進度？`)) return;
            closeMenu();
            applyImportedDeck(list, item.displayName);
        }

        function updateStatsUi() {
            document.getElementById('statAgain').innerText = stats.again;
            document.getElementById('statHard').innerText = stats.hard;
            document.getElementById('statGood').innerText = stats.good;
            document.getElementById('statEasy').innerText = stats.easy;
        }

        function scoreVoiceForEnglish(v) {
            const lang = (v.lang || '').toLowerCase().replace('_', '-');
            if (!/^en/i.test(lang)) return -1e6;
            const name = (v.name || '').toLowerCase();
            let s = 0;
            if (lang === 'en-us' || lang.startsWith('en-us')) s += 40;
            else if (lang.startsWith('en-gb')) s += 28;
            else if (lang.startsWith('en')) s += 20;
            if (/natural|neural|premium|enhanced|wavenet|polyglot|expressive|generative/.test(name)) s += 120;
            if (/google\s+/.test(name) && /english/.test(name)) s += 70;
            if (/microsoft\s+/.test(name) && /(natural|neural|online)/.test(name)) s += 75;
            if (/microsoft\s+(jenny|aria|guy|davis|jane|sonia|ryan|andrew|emma|brian|michelle)\b/.test(name)) s += 55;
            if (/samantha|allison|victoria|aaron|nicky|susan|daniel|karen|moira|fiona|tessa/.test(name)) s += 45;
            if (/apple\s+/.test(name)) s += 35;
            if (!v.localService && /google|microsoft/.test(name)) s += 15;
            if (/compact|low\s*quality|basic/.test(name)) s -= 80;
            if (/^microsoft\s+mark\b|^microsoft\s+zira\b|^microsoft\s+david\b/.test(name)) s -= 25;
            return s;
        }

        function getPreferredEnglishVoice() {
            if (!('speechSynthesis' in window)) return null;
            const voices = window.speechSynthesis.getVoices();
            if (!voices.length) return preferredEnglishVoiceCache;
            let best = null;
            let bestScore = -Infinity;
            for (const v of voices) {
                const sc = scoreVoiceForEnglish(v);
                if (sc > bestScore) {
                    bestScore = sc;
                    best = v;
                }
            }
            if (best && bestScore > -5e5) {
                preferredEnglishVoiceCache = best;
                return best;
            }
            preferredEnglishVoiceCache = voices.find((x) => /^en/i.test(x.lang)) || null;
            return preferredEnglishVoiceCache;
        }

        function playAudio(text, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!('speechSynthesis' in window)) {
                console.warn('此瀏覽器不支援語音合成功能');
                return;
            }
            const t = String(text || '').trim();
            if (!t) return;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(t);
            const voice = getPreferredEnglishVoice();
            if (voice) {
                utterance.voice = voice;
                utterance.lang = voice.lang || 'en-US';
            } else {
                utterance.lang = 'en-US';
            }
            utterance.rate = t.length > 140 ? 0.96 : 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            window.speechSynthesis.speak(utterance);
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.addEventListener('voiceschanged', () => {
                preferredEnglishVoiceCache = null;
            });
            window.speechSynthesis.getVoices();
        }

        function stripSlashPadding(s) {
            return String(s || '')
                .trim()
                .replace(/^\/*/, '')
                .replace(/\/*$/, '')
                .trim();
        }

        function stripDiacritics(s) {
            try {
                return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            } catch {
                return String(s);
            }
        }

        function formatSlashPhonetic(inner) {
            const c = stripSlashPadding(inner);
            return c ? `/${c}/` : '';
        }

        /** 從 API 回傳的 entries 陣列中找出第一段可用音標（多義詞時不只看第一筆） */
        function extractPhoneticFromApiArray(arr) {
            if (!Array.isArray(arr)) return '';
            for (const entry of arr) {
                if (!entry || typeof entry !== 'object') continue;
                const ph = entry.phonetics;
                if (Array.isArray(ph)) {
                    for (const p of ph) {
                        const tx = p && String(p.text || '').trim();
                        if (tx) return tx;
                    }
                }
                const top = entry.phonetic && String(entry.phonetic).trim();
                if (top) return top;
            }
            return '';
        }

        async function fetchDictionaryEntriesJson(query) {
            const q = String(query || '').trim();
            if (!q) return null;
            const r = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(q));
            if (!r.ok) return null;
            const data = await r.json();
            return Array.isArray(data) ? data : null;
        }

        async function fetchDictionaryPhonetic(word) {
            const w = String(word || '').trim();
            if (!w) return '';
            const cacheKey = w.toLowerCase();
            if (dictionaryPhoneticCache.has(cacheKey)) return dictionaryPhoneticCache.get(cacheKey);

            const variants = [];
            const add = (x) => {
                const v = String(x || '').trim();
                if (v && !variants.includes(v)) variants.push(v);
            };
            add(w);
            add(stripDiacritics(w));
            const firstTok = w.split(/\s+/)[0];
            add(firstTok);

            let out = '';
            try {
                for (const q of variants) {
                    const arr = await fetchDictionaryEntriesJson(q);
                    if (!arr || !arr.length) continue;
                    const text = extractPhoneticFromApiArray(arr);
                    if (text) {
                        out = stripSlashPadding(text);
                        break;
                    }
                }
            } catch {
                out = '';
            }
            dictionaryPhoneticCache.set(cacheKey, out);
            return out;
        }

        function prefetchPhoneticsForQueue() {
            for (let i = 1; i <= 12; i++) {
                if (!wordsList[i]) break;
                const w = wordsList[i].keyword;
                if (!w || (wordsList[i].kk || '').trim()) continue;
                const key = w.toLowerCase();
                if (dictionaryPhoneticCache.has(key)) continue;
                fetchDictionaryPhonetic(w).catch(() => {});
            }
        }

        function toggleFlip() {
            const flipRoot = document.getElementById('flipCardRoot');
            const frontFace = document.getElementById('frontFace');
            const backFace = document.getElementById('backFace');
            if (!flipRoot || flipRoot.classList.contains('hidden') || !frontFace || !backFace) return;

            isFlipped = !isFlipped;

            if (isFlipped) {
                flipRoot.classList.add('rotate-y-180');
                frontFace.classList.add('pointer-events-none');
                backFace.classList.remove('pointer-events-none');
            } else {
                flipRoot.classList.remove('rotate-y-180');
                frontFace.classList.remove('pointer-events-none');
                backFace.classList.add('pointer-events-none');
            }
        }

        function resetFlip() {
            isFlipped = false;
            const flipRoot = document.getElementById('flipCardRoot');
            const frontFace = document.getElementById('frontFace');
            const backFace = document.getElementById('backFace');
            if (flipRoot) flipRoot.classList.remove('rotate-y-180');
            if (frontFace) frontFace.classList.remove('pointer-events-none');
            if (backFace) backFace.classList.add('pointer-events-none');
        }

        function renderCard() {
            const emptyEl = document.getElementById('deckEmptyPrompt');
            const completeEl = document.getElementById('deckCompleteScreen');
            const flipRoot = document.getElementById('flipCardRoot');

            if (baselineWords.length === 0) {
                resetFlip();
                if (emptyEl) emptyEl.classList.remove('hidden');
                if (completeEl) completeEl.classList.add('hidden');
                if (flipRoot) flipRoot.classList.add('hidden');
                persistState();
                updateDeckTitleUi();
                return;
            }

            if (wordsList.length === 0) {
                if (emptyEl) emptyEl.classList.add('hidden');
                if (flipRoot) flipRoot.classList.add('hidden');
                if (completeEl) completeEl.classList.remove('hidden');
                resetFlip();
                const lab = document.getElementById('completeProgressText');
                if (lab) lab.innerText = `0/${initialTotal}`;
                persistState();
                return;
            }

            if (emptyEl) emptyEl.classList.add('hidden');
            if (completeEl) completeEl.classList.add('hidden');
            if (flipRoot) flipRoot.classList.remove('hidden');

            currentWord = wordsList[0];
            
            const completedCount = initialTotal - wordsList.length;
            document.getElementById('progressText').innerText = `${wordsList.length}/${initialTotal}`;
            const progressPercent = (completedCount / initialTotal) * 100;
            document.getElementById('progressBar').style.width = `${progressPercent}%`;

            document.getElementById('frontWord').innerText = currentWord.keyword;

            const kkEl = document.getElementById('frontKk');
            const jsonKk = (currentWord.kk || '').trim();
            const kkSeq = ++frontKkRequestSeq;
            const kwForKk = currentWord.keyword;
            const cacheKey = String(kwForKk || '').toLowerCase();

            if (kkEl) {
                kkEl.removeAttribute('title');
                kkEl.classList.remove('animate-pulse');

                if (jsonKk) {
                    const line = formatSlashPhonetic(jsonKk);
                    if (line) {
                        kkEl.textContent = line;
                        kkEl.title = 'KK 音標（來自詞表）';
                        kkEl.classList.remove('hidden');
                    } else {
                        kkEl.textContent = '';
                        kkEl.classList.add('hidden');
                    }
                } else if (dictionaryPhoneticCache.has(cacheKey)) {
                    const raw = dictionaryPhoneticCache.get(cacheKey);
                    const line = raw ? formatSlashPhonetic(raw) : '';
                    if (line) {
                        kkEl.textContent = line;
                        kkEl.title = '線上辭典參考音標（多為 IPA）';
                        kkEl.classList.remove('hidden');
                    } else {
                        kkEl.textContent = '';
                        kkEl.classList.add('hidden');
                    }
                } else {
                    kkEl.textContent = '/⋯/';
                    kkEl.title = '查詢音標中…';
                    kkEl.classList.add('animate-pulse');
                    kkEl.classList.remove('hidden');
                    fetchDictionaryPhonetic(kwForKk).then((t) => {
                        if (kkSeq !== frontKkRequestSeq) return;
                        if (!wordsList.length || wordsList[0].keyword !== kwForKk) return;
                        const line = t ? formatSlashPhonetic(t) : '';
                        kkEl.classList.remove('animate-pulse');
                        if (!line) {
                            kkEl.textContent = '';
                            kkEl.classList.add('hidden');
                            kkEl.removeAttribute('title');
                            return;
                        }
                        kkEl.textContent = line;
                        kkEl.title = '線上辭典參考音標（多為 IPA）';
                        kkEl.classList.remove('hidden');
                    });
                }
            }

            prefetchPhoneticsForQueue();

            document.getElementById('backWord').innerText = currentWord.keyword;
            document.getElementById('backPosGloss').innerText = `${currentWord.pos} ${currentWord.zh_gloss}`;

            const synContainer = document.getElementById('synonymsContainer');
            if (currentWord.synonyms && currentWord.synonyms.length > 0) {
                synContainer.classList.remove('hidden');
                document.getElementById('synonymsText').innerText = currentWord.synonyms.join(', ');
            } else {
                synContainer.classList.add('hidden');
            }

            const phrContainer = document.getElementById('phrasesContainer');
            const phrList = document.getElementById('phrasesList');
            phrList.innerHTML = '';
            if (currentWord.phrases && currentWord.phrases.length > 0) {
                phrContainer.classList.remove('hidden');
                currentWord.phrases.forEach(phr => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span class="font-semibold text-indigo-700">${phr.en}</span> - ${phr.zh}`;
                    phrList.appendChild(li);
                });
            } else {
                phrContainer.classList.add('hidden');
            }

            const exContainer = document.getElementById('examplesContainer');
            const exList = document.getElementById('examplesList');
            exList.innerHTML = '';
            if (currentWord.examples && currentWord.examples.length > 0) {
                exContainer.classList.remove('hidden');
                currentWord.examples.forEach(ex => {
                    const div = document.createElement('div');
                    div.className = 'bg-slate-50 p-3 sm:p-4 rounded-xl flex items-start gap-3';
                    
                    const btnHtml = `
                        <button type="button" onclick="playAudio('${ex.en.replace(/'/g, "\\'")}', event)" class="text-indigo-500 active:text-indigo-700 mt-0.5 shrink-0 p-1" title="朗讀例句">
                            <i class="ph-fill ph-speaker-high text-xl sm:text-2xl"></i>
                        </button>
                    `;
                    
                    const textHtml = `
                        <div class="min-w-0">
                            <p class="text-slate-800 text-sm sm:text-base font-medium mb-1 leading-relaxed">${ex.en}</p>
                            <p class="text-slate-500 text-xs sm:text-sm leading-relaxed">${ex.zh}</p>
                        </div>
                    `;
                    
                    div.innerHTML = btnHtml + textHtml;
                    exList.appendChild(div);
                });
            } else {
                exContainer.classList.add('hidden');
            }

            const kw = currentWord.keyword;
            const seq = ++autoSpeakCardSeq;
            window.speechSynthesis.cancel();
            window.setTimeout(() => {
                if (seq !== autoSpeakCardSeq) return;
                if (!wordsList.length || wordsList[0].keyword !== kw) return;
                playAudio(kw);
            }, 120);
        }

        function handleRating(rating, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }

            if (wordsList.length === 0) return;

            const card = wordsList.shift();
            
            switch(rating) {
                case 'again':
                    stats.again++;
                    wordsList.splice(1, 0, card);
                    break;
                case 'hard':
                    stats.hard++;
                    const hardIndex = Math.min(wordsList.length, Math.floor(Math.random() * 3) + 2);
                    wordsList.splice(hardIndex, 0, card);
                    break;
                case 'good':
                    stats.good++;
                    const goodIndex = Math.floor(wordsList.length * 0.75);
                    wordsList.splice(goodIndex, 0, card);
                    break;
                case 'easy':
                    stats.easy++;
                    break;
            }

            document.getElementById('statAgain').innerText = stats.again;
            document.getElementById('statHard').innerText = stats.hard;
            document.getElementById('statGood').innerText = stats.good;
            document.getElementById('statEasy').innerText = stats.easy;

            persistState();

            resetFlip();
            setTimeout(() => {
                renderCard();
            }, 150);
        }

        function resetAllProgress() {
            if (!confirm('確定要重置所有進度？此操作無法復原。')) return;
            localStorage.removeItem(STORAGE_KEY);
            wordsList = baselineWords.slice();
            stats.again = stats.hard = stats.good = stats.easy = 0;
            isFlipped = false;
            closeMenu();
            resetFlip();
            updateStatsUi();
            persistState();
            renderCard();
        }

        function applyImportedDeck(entries, displayName) {
            const list = entries.map(normalizeEntry).filter(w => w.keyword);
            if (!list.length) {
                alert('檔案中沒有可用的單字（需要 keyword 或 word 欄位）。');
                return;
            }
            baselineWords = list;
            initialTotal = baselineWords.length;
            wordsList = baselineWords.slice();
            stats.again = stats.hard = stats.good = stats.easy = 0;
            currentDeckDisplayName = stripJsonExtension(displayName || '');
            isFlipped = false;
            resetFlip();
            updateStatsUi();
            saveDeckToHistory(displayName || currentDeckDisplayName || '詞表', baselineWords);
            persistState();
            updateDeckTitleUi();
            renderCard();
        }

        document.getElementById('jsonFileInput').addEventListener('change', (e) => {
            const input = e.target;
            const file = input.files && input.files[0];
            input.value = '';
            if (!file) return;
            closeMenu();
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const data = JSON.parse(String(reader.result || '{}'));
                    const rawEntries = extractEntriesFromUnknownJson(data);
                    if (!rawEntries.length) {
                        alert('無法從此 JSON 讀取單字。請使用 extract.results[].entries（或 extract.entries、words、entries 陣列）等結構，且項目需含 keyword 或 word。');
                        return;
                    }
                    applyImportedDeck(rawEntries, file.name);
                } catch (err) {
                    console.warn(err);
                    alert('JSON 解析失敗，請確認檔案為有效的 UTF-8 JSON。');
                }
            };
            reader.onerror = () => alert('讀取檔案失敗。');
            reader.readAsText(file, 'UTF-8');
        });

        function openMenu() {
            document.getElementById('menuBackdrop').classList.remove('hidden');
            document.getElementById('appMenuPanel').classList.remove('hidden');
            document.getElementById('menuOpenBtn').setAttribute('aria-expanded', 'true');
            renderDeckHistoryMenu();
        }

        function closeMenu() {
            document.getElementById('menuBackdrop').classList.add('hidden');
            document.getElementById('appMenuPanel').classList.add('hidden');
            document.getElementById('menuOpenBtn').setAttribute('aria-expanded', 'false');
        }

        document.getElementById('menuOpenBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            const panel = document.getElementById('appMenuPanel');
            if (panel.classList.contains('hidden')) openMenu();
            else closeMenu();
        });
        document.getElementById('menuBackdrop').addEventListener('click', closeMenu);
        document.getElementById('menuResetBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            resetAllProgress();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMenu();
                return;
            }
            if (isFlipped) {
                if (e.key === '1') handleRating('again');
                if (e.key === '2') handleRating('hard');
                if (e.key === '3') handleRating('good');
                if (e.key === '4') handleRating('easy');
            }
            if (e.key === ' ' || e.key === 'Enter') {
                toggleFlip();
                e.preventDefault();
            }
        });

        document.addEventListener('wheel', (e) => {
            if (e.ctrlKey) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
        }, { passive: false });
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        }, true);

        loadPersistedState();
        updateDeckTitleUi();
        renderDeckHistoryMenu();
        updateStatsUi();
        // 初始化
        renderCard();

    </script>
</body>
</html>
