<!DOCTYPE html>
<html lang="zh-TW" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
    <title>VocaUp</title>
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-title" content="VocaUp">
    <link rel="icon" type="image/png" href="icon.png" sizes="512x512">
    <link rel="icon" type="image/png" href="icon.png" sizes="32x32">
    <link rel="shortcut icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png" sizes="180x180">
    <script>
    (function () {
        try {
            var abs = new URL('icon.png', document.URL).href;
            document.querySelectorAll(
                'link[rel="icon"], link[rel="shortcut icon"], link[rel="apple-touch-icon"]'
            ).forEach(function (el) {
                var h = el.getAttribute('href');
                if (h === 'icon.png' || (h && h.endsWith('/icon.png')))
                    el.setAttribute('href', abs);
            });
        } catch (_) {}
    })();
    </script>
    <!-- file:// 無法載入 manifest（CORS origin null）；僅在 http/https 註冊 PWA -->
    <script>
    (function () {
        if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = 'manifest.webmanifest';
        document.head.appendChild(link);
    })();
    </script>
    <!-- 引入 Tailwind CSS 進行快速切版（正式環境請改 CLI/PostCSS 建置，見 https://tailwindcss.com/docs/installation） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 作為圖示 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Firebase（compat，與主流程非 module 腳本共用）-->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* 禁止選取字樣、長按選單；縮放主要由 viewport + 下方 JS 輔助 */
        html {
            height: 100%;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body {
            height: 100%;
            max-height: 100vh;
            overflow: hidden;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        @supports (height: 100dvh) {
            body {
                max-height: 100dvh;
            }
        }
        .app-root {
            box-sizing: border-box;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding-left: max(0.75rem, env(safe-area-inset-left, 0px));
            padding-right: max(0.75rem, env(safe-area-inset-right, 0px));
            padding-top: max(0.5rem, env(safe-area-inset-top, 0px));
            padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px));
        }
        @supports (height: 100dvh) {
            .app-root {
                height: 100dvh;
                max-height: 100dvh;
            }
        }
        /* 翻轉卡片 */
        .perspective {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 自選合併詞表：DAY 藥丸軌道左右往返（變數由 JS 依內容與寬度寫入） */
        @keyframes custom-deck-chip-pingpong {
            0% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(calc(-1 * var(--deck-chip-drift, 0px)));
            }
            100% {
                transform: translateX(0);
            }
        }
        .custom-deck-chip-track--pingpong {
            animation: custom-deck-chip-pingpong 14s ease-in-out infinite;
            will-change: transform;
        }
        @media (prefers-reduced-motion: reduce) {
            .custom-deck-chip-track--pingpong {
                animation: none;
                transform: none;
            }
        }
        .custom-deck-chips-marquee-pause:hover .custom-deck-chip-track--pingpong,
        .custom-deck-chips-marquee-pause:active .custom-deck-chip-track--pingpong {
            animation-play-state: paused;
        }
        /* 卡片舞台：吃掉剩餘高度，供內層 absolute 填滿 */
        .card-stage {
            flex: 1 1 0;
            min-height: 0;
            width: 100%;
        }
        /* 背面捲動區：長英文／無空格字串不會被螢幕右緣裁切 */
        .card-prose-wrap {
            min-width: 0;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        /* 與 .app-root 內容區同寬、同左右 inset（供 fixed 全螢幕層對齊主畫面頂列） */
        .app-bar-strip {
            box-sizing: border-box;
            width: 100%;
            max-width: 28rem;
            margin-left: auto;
            margin-right: auto;
            padding-left: max(0.75rem, env(safe-area-inset-left, 0px));
            padding-right: max(0.75rem, env(safe-area-inset-right, 0px));
        }
        /* 主畫面頂列／測驗頂列共用：左右固定寬，中欄 1fr，標題才會與主畫面同一幾何中心 */
        .app-topbar-grid {
            display: grid;
            grid-template-columns: 3.5rem minmax(0, 1fr) 3.5rem;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
        }
        .app-topbar-side {
            display: flex;
            height: 2.75rem;
            align-items: center;
        }
        .app-topbar-side--start {
            justify-content: flex-start;
        }
        .app-topbar-side--end {
            justify-content: flex-end;
        }
        #quizOverlay input {
            user-select: text;
            -webkit-user-select: text;
        }
        /* 聽音拼字：頭尾字與中間格同一字級、同一基準線對齊 */
        #quizWordHost .quiz-spell-row {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: center;
            gap: 0.2em;
            font-size: clamp(2rem, 12vmin, 4rem);
            font-weight: 700;
            color: rgb(49 46 129);
            line-height: 1;
            min-width: 0;
        }
        #quizWordHost .quiz-edge-char {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            min-height: 1.12em;
            flex-shrink: 0;
        }
        #quizWordHost .quiz-spell-row .quiz-mid-cell {
            box-sizing: border-box;
            margin: 0;
            padding: 0 0 2px;
            font: inherit;
            font-size: inherit;
            font-weight: 700;
            color: inherit;
            text-align: center;
            line-height: 1;
            width: 1em;
            min-width: 1em;
            min-height: 1.05em;
            height: auto;
            border: none;
            border-radius: 0;
            border-bottom: 2px solid rgb(199 210 254);
            background: transparent;
            vertical-align: baseline;
        }
        #quizWordHost .quiz-spell-row .quiz-mid-cell:focus {
            border-bottom-color: rgb(99 102 241);
            outline: none;
        }

        /*
         * 右下角「回首頁」浮動鍵：貼在 #cardInner（翻卡區／歡迎畫面的圓角白底）內側右下角，
         * 版型仍參考 money.html .currency-toggle-btn（縮折標籤／hover 展開）
         */
        .app-home-fab {
            position: absolute;
            bottom: max(0.375rem, calc(env(safe-area-inset-bottom, 0px)));
            right: max(0.375rem, env(safe-area-inset-right, 0px));
            width: 2.625rem;
            height: 2.625rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgb(203 213 225);
            color: rgb(51 65 85);
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
            z-index: 50;
            transition:
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.25s ease,
                background-color 0.25s ease;
            padding: 0;
            gap: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .app-home-fab:hover {
            transform: scale(1.02);
            background: rgba(241 245 249 / 0.95) !important;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.14);
        }
        .app-home-fab:active {
            transform: scale(0.95);
        }
        .app-home-fab i.ph {
            font-size: 0.8125rem;
            margin: 0;
            line-height: 1;
            transition: font-size 0.25s ease;
        }
        .app-home-fab .app-home-fab-label {
            font-size: 0.625rem;
            line-height: 1;
            opacity: 0;
            max-height: 0;
            transform: scale(0.85);
            overflow: hidden;
            transition: opacity 0.25s ease, max-height 0.25s ease, transform 0.25s ease;
            font-weight: 600;
        }
        @media (min-width: 768px) {
            .app-home-fab:hover {
                width: 3.875rem;
                height: 3.875rem;
                gap: 0.125rem;
            }
            .app-home-fab:hover i.ph {
                font-size: 1.125rem;
            }
            .app-home-fab:hover .app-home-fab-label {
                opacity: 1;
                max-height: 1rem;
                transform: scale(1);
            }
        }
        @media (max-width: 767px) {
            .app-home-fab {
                bottom: max(0.5rem, env(safe-area-inset-bottom, 0px));
                right: max(0.5rem, env(safe-area-inset-right, 0px));
                width: 2.875rem;
                height: 2.875rem;
                gap: 0.125rem;
            }
            .app-home-fab i.ph {
                font-size: 1rem;
            }
            .app-home-fab .app-home-fab-label {
                opacity: 1;
                max-height: 0.75rem;
                transform: scale(1);
            }
        }
    </style>
</head>
<body class="h-full max-h-full overflow-hidden bg-slate-50 font-sans text-slate-800 antialiased touch-manipulation select-none">

    <div class="app-root relative w-full max-w-md mx-auto min-h-0">
    <!-- 選單：獨立最頂一列，不與卡片內進度條同一行 -->
    <div id="menuToolbar" class="relative z-[60] shrink-0 w-full min-h-[2.75rem] py-1">
        <div class="app-topbar-grid">
            <div class="app-topbar-side app-topbar-side--start">
                <button type="button" id="menuOpenBtn" class="shrink-0 p-2 rounded-lg text-slate-600 hover:bg-slate-200/90 active:bg-slate-300/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400" aria-label="開啟選單" aria-expanded="false" aria-controls="appMenuPanel">
                    <i class="ph ph-list text-2xl sm:text-[1.75rem]"></i>
                </button>
            </div>
            <div id="deckTitleBlock" class="min-w-0 flex max-w-full flex-col items-center justify-center px-1 leading-snug invisible" title="">
                <span id="deckTitleLine1" class="hidden max-w-full truncate text-center text-[10px] sm:text-xs font-medium text-slate-500"></span>
                <span id="deckTitleLine2" class="max-w-full truncate text-center text-sm sm:text-base font-semibold text-slate-700"></span>
            </div>
            <div class="app-topbar-side app-topbar-side--end">
                <button type="button" id="quizOpenBtn" class="shrink-0 p-2 rounded-lg text-slate-600 hover:bg-slate-200/90 active:bg-slate-300/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400" aria-label="聽音拼字測驗" title="聽音拼字測驗">
                    <i class="ph ph-exam text-2xl sm:text-[1.75rem]" aria-hidden="true"></i>
                </button>
            </div>
        </div>
        <input type="file" id="jsonFileInput" accept=".json,application/json" multiple class="hidden" aria-hidden="true">
        <nav id="appMenuPanel" class="hidden absolute left-0 top-full mt-1 z-[60] w-max max-w-[calc(100vw-1rem)] rounded-xl border border-slate-200 bg-white py-2 shadow-xl overflow-hidden" role="menu" aria-label="選單">
            <label for="jsonFileInput" id="menuImportLabel" role="menuitem" class="flex cursor-pointer items-center whitespace-nowrap px-5 py-4 text-left text-base sm:text-lg font-medium leading-snug text-slate-700 hover:bg-slate-50 active:bg-slate-100 border-b border-slate-100">
                匯入自選
            </label>
            <button type="button" id="menuFirebaseChapterBtn" role="menuitem" class="block whitespace-nowrap px-5 py-4 text-left text-base sm:text-lg font-medium leading-snug text-indigo-700 hover:bg-indigo-50 active:bg-indigo-100 w-full">
                章節選擇
            </button>
        </nav>
    </div>
    <div id="menuBackdrop" class="hidden fixed inset-0 z-[55] bg-slate-900/30" aria-hidden="true"></div>

    <!-- 聽音拼字測驗：頂列與 menuToolbar 共用 .app-topbar-grid + .app-bar-strip 對齊主畫面 -->
    <div id="quizOverlay" class="hidden fixed inset-0 z-[70] flex flex-col bg-slate-100" aria-modal="true" role="dialog" aria-labelledby="quizOverlayTitle">
        <div class="shrink-0 w-full border-b border-slate-200 bg-white shadow-sm pt-[max(0.5rem,env(safe-area-inset-top,0px))]">
            <div class="app-bar-strip min-h-[2.75rem] py-1">
                <div class="app-topbar-grid">
                    <div class="app-topbar-side app-topbar-side--start">
                        <button type="button" id="quizCloseBtn" class="shrink-0 whitespace-nowrap p-2 rounded-lg text-slate-600 hover:bg-slate-200/90 active:bg-slate-300/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 text-sm sm:text-base font-semibold leading-none" aria-label="返回">返回</button>
                    </div>
                    <span id="quizOverlayTitle" class="min-w-0 text-center text-sm sm:text-base font-semibold text-slate-700 truncate px-1">聽音拼字</span>
                    <div class="app-topbar-side app-topbar-side--end">
                        <span id="quizProgressWrap" class="block min-w-0 w-full max-w-[3.5rem] text-center text-sm sm:text-base font-semibold text-slate-700 tabular-nums truncate invisible"><span id="quizProgressText">0/0</span></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex-1 min-h-0 flex flex-col overflow-hidden">
            <!-- 步驟一：出題方式 -->
            <div id="quizModePanel" class="flex-1 min-h-0 overflow-y-auto overscroll-contain touch-pan-y flex flex-col items-center justify-center px-5 py-8 w-full max-w-md mx-auto">
                <p class="text-base font-semibold text-slate-800 mb-1 text-center">選擇出題方式</p>
                <p id="quizModeCountHint" class="text-xs text-slate-500 mb-8 text-center"></p>
                <div class="w-full flex flex-col gap-3">
                    <button type="button" id="quizModeRandom" class="w-full py-4 px-4 rounded-2xl border-2 border-indigo-200 bg-white text-left shadow-sm hover:bg-indigo-50 active:bg-indigo-100 transition-colors">
                        <span class="block text-base font-bold text-indigo-900">隨機出題</span>
                        <span class="block text-xs text-slate-500 mt-1">全部單字，順序洗牌</span>
                    </button>
                    <button type="button" id="quizModeSequential" class="w-full py-4 px-4 rounded-2xl border-2 border-slate-200 bg-white text-left shadow-sm hover:bg-slate-50 active:bg-slate-100 transition-colors">
                        <span class="block text-base font-bold text-slate-900">正常出題</span>
                        <span class="block text-xs text-slate-500 mt-1">依詞表原始順序</span>
                    </button>
                    <button type="button" id="quizModeSample20" class="w-full py-4 px-4 rounded-2xl border-2 border-teal-200 bg-white text-left shadow-sm hover:bg-teal-50 active:bg-teal-100 transition-colors">
                        <span class="block text-base font-bold text-teal-900">隨機抽考 20 題</span>
                        <span class="block text-xs text-slate-500 mt-1">從詞表隨機抽出至多 20 題</span>
                    </button>
                </div>
            </div>
            <!-- 步驟二：作答（單字＋喇吧區塊與主畫面 frontFace 內層同結構：置中；送出在下方） -->
            <div id="quizPlayPanel" class="hidden flex-1 min-h-0 flex flex-col overflow-hidden">
                <div class="flex-1 min-h-0 flex flex-col p-3 sm:p-5">
                    <!-- 與 frontFace 頂部進度列同高，讓單字＋喇吧與主畫面垂直位置對齊 -->
                    <div class="shrink-0 w-full flex items-center gap-2 sm:gap-3 px-0.5 pt-0 pb-2 sm:pb-3 invisible pointer-events-none select-none" aria-hidden="true">
                        <div class="flex-1 min-w-0 bg-slate-200 rounded-full h-1.5 sm:h-2 opacity-0"></div>
                        <span class="shrink-0 text-[10px] sm:text-xs font-bold tabular-nums tracking-widest text-slate-400">0/0</span>
                    </div>
                    <div class="flex-1 min-h-0 flex flex-col items-center justify-center gap-3 sm:gap-5 px-2 sm:px-4 w-full overflow-y-auto overscroll-contain touch-pan-y no-scrollbar">
                        <div id="quizWordHost" class="w-full flex justify-center shrink-0 min-h-0"></div>
                        <button type="button" id="quizSpeakBtn" class="text-slate-400 hover:text-indigo-500 active:text-indigo-600 transition-colors p-3 sm:p-4 rounded-full hover:bg-indigo-50 z-10 shrink-0" title="朗讀單字">
                            <i class="ph-fill ph-speaker-high text-4xl sm:text-5xl" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div class="shrink-0 flex flex-col items-center gap-4 pt-2 pb-6 sm:pb-8 px-2 w-full max-w-md mx-auto">
                        <button type="button" id="quizSubmitBtn" class="px-8 py-3 rounded-xl bg-slate-800 text-white text-sm font-semibold hover:bg-slate-700 active:bg-slate-900">送出</button>
                        <div id="quizTapNext" class="hidden w-full max-w-sm flex flex-col items-center cursor-pointer select-none rounded-2xl border border-dashed border-slate-300 bg-white/80 px-4 py-5 touch-manipulation" tabindex="0" role="button" aria-label="進入下一題">
                            <div id="quizFeedback" class="hidden flex flex-col items-center gap-2 text-center">
                                <i id="quizFeedbackIcon" class="ph-fill ph-check-circle text-6xl text-emerald-500" aria-hidden="true"></i>
                                <p id="quizFeedbackWrongLine" class="hidden text-sm text-slate-700 card-prose-wrap max-w-full">
                                    正確答案：<span id="quizAnswerReveal" class="font-semibold text-indigo-800"></span>
                                </p>
                            </div>
                            <p id="quizNextHint" class="hidden text-sm text-slate-400 mt-3 text-center">點一下進入下一題</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 章節（Firebase DAY）選擇 -->
    <div id="dayPickOverlay" class="hidden fixed inset-0 z-[65] flex flex-col bg-slate-100" aria-modal="true" role="dialog" aria-labelledby="dayPickTitle">
        <div class="shrink-0 w-full border-b border-slate-200 bg-white shadow-sm pt-[max(0.5rem,env(safe-area-inset-top,0px))]">
            <div class="app-bar-strip min-h-[2.75rem] py-1">
                <div class="app-topbar-grid">
                    <div class="app-topbar-side app-topbar-side--start">
                        <button type="button" id="dayPickBackBtn" class="shrink-0 whitespace-nowrap p-2 rounded-lg text-slate-600 hover:bg-slate-200/90 active:bg-slate-300/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 text-sm sm:text-base font-semibold leading-none" aria-label="返回">返回</button>
                    </div>
                    <span id="dayPickTitle" class="min-w-0 text-center text-sm sm:text-base font-semibold text-slate-700 truncate px-1">章節選擇</span>
                    <div class="app-topbar-side app-topbar-side--end"></div>
                </div>
            </div>
        </div>
        <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain touch-pan-y px-4 py-6 w-full max-w-md mx-auto flex flex-col">
            <div id="dayPickSourcePanel" class="flex flex-col gap-4 w-full">
                <button type="button" id="dayPickCustomDeckBtn" class="w-full py-5 px-4 rounded-2xl border-2 border-slate-200 bg-white shadow-sm hover:bg-slate-50 active:bg-slate-100 transition-colors touch-manipulation flex flex-row items-center justify-start">
                    <span class="block text-base font-bold text-slate-900 text-left">自選單字</span>
                </button>
                <!-- Firebase 根下每個詞表資料夾動態成一顆按鈕（書名鍵為資料庫實際名稱） -->
                <div id="dayPickFirebaseBooksHost" class="flex flex-col gap-3 w-full">
                    <p id="dayPickFirebaseBooksStatus" class="hidden text-xs text-center min-h-[1.25em] text-slate-500"></p>
                    <div id="dayPickFirebaseCategoryList" class="flex flex-col gap-3 w-full"></div>
                </div>
            </div>
            <div id="dayPickDayPanel" class="hidden flex flex-col w-full flex-1 min-h-0">

    <script>
        const rawJsonData = { extract: { results: [] } };

        const DECK_HISTORY_MAX = 15;
        /** 主畫面歡迎區「最近學習」列出的自選紀錄筆數上限 */
        const HOME_RECENT_DECKS_MAX = 6;

        /** 雲端 DAY 專用：不受「最近匯入」筆數上限影響，重新從 Firebase 進入同一天時還原進度 */
        const CLOUD_DAY_PROGRESS_KEY = 'toeic-cloud-day-progress-v1';
        /** Firebase 「書」層級預期鍵名；實際標題仍以資料庫鍵為準（顯示在頂題） */
        const FIREBASE_TOEIC_BOOK_DISPLAY_NAME = '新制多益 TOEIC 單字大全';
        /** 匯入自選詞表頂列第一行（與章節選單「自選單字」一致） */
        const CUSTOM_DECK_BAR_LINE = '自選單字';
        /** 歡迎區天氣：定位失敗或非安全情境時使用（台北） */
        const WELCOME_WEATHER_FALLBACK_LAT = 25.033964;
        const WELCOME_WEATHER_FALLBACK_LON = 121.564468;
        /** 歡迎區天氣快取最短間隔（同曆日內不重複請求，除非間隔過了） */
        const WELCOME_WEATHER_FETCH_MIN_MS = 25 * 60 * 1000;
        let welcomeWeatherCache = { dayKey: '', at: 0, text: '' };
        const FIREBASE_DAY_LONG_PRESS_MS = 520;
        const FIREBASE_DAY_LONG_PRESS_MOVE_PX = 14;
        /** 雲端 DAY 長按複選合併 → 自選（須在繪格／手勢函式之前宣告）。 */
        let firebaseChapterMultiSelectActive = false;
        const firebaseChapterSelectedDayKeys = new Set();
        /** 僅擋「長按進複選」那張卡接下來的 click，避免誤開章節；勿用全域旗標以免下一張卡的第一下被吃掉。 */
        let suppressNextFirebaseDayClickForDayKey = null;

        function loadCloudDayProgressMap() {
            try {
                const raw = localStorage.getItem(CLOUD_DAY_PROGRESS_KEY);
                if (!raw) return {};
                const o = JSON.parse(raw);
                return o && typeof o === 'object' ? o : {};
            } catch {
                return {};
            }
        }

        function getCloudDayProgress(displayName) {
            const name = String(displayName || '').trim();
            if (!name) return null;
            const map = loadCloudDayProgressMap();
            const snap = map[name];
            if (!snap || typeof snap !== 'object') return null;
            if (!Array.isArray(snap.baselineWords) || !Array.isArray(snap.wordsList)) return null;
            return snap;
        }

        /** 將目前為「雲端 DAY」的牌組進度另行存一份（與 STORAGE_KEY 併存） */
        function saveCloudDayProgressSnapshot(displayName, baseline, wl, statsObj) {
            const name = String(displayName || '').trim();
            if (!name) return;
            try {
                const map = loadCloudDayProgressMap();
                map[name] = {
                    baselineWords: baseline.map(normalizeEntry).filter((w) => w.keyword),
                    wordsList: wl.map(normalizeEntry).filter((w) => w.keyword),
                    stats: {
                        again: statsObj.again,
                        hard: statsObj.hard,
                        good: statsObj.good,
                        easy: statsObj.easy,
                    },
                    savedAt: Date.now(),
                };
                localStorage.setItem(CLOUD_DAY_PROGRESS_KEY, JSON.stringify(map));
            } catch (e) {
                console.warn('儲存雲端 DAY 進度失敗', e);
            }
        }

        function firebaseProgressTotalRatings(st) {
            if (!st || typeof st !== 'object') return 0;
            return (
                (Number(st.again) || 0) +
                (Number(st.hard) || 0) +
                (Number(st.good) || 0) +
                (Number(st.easy) || 0)
            );
        }

        /** 讀取主工作階段 STORAGE 中同 progressKey 的雲端章節快照（與 CLOUD map 可能不同步時用於合併）。 */
        function readStorageFirebaseSnapshotForKey(progressKey) {
            const want = String(progressKey || '').trim();
            if (!want) return null;
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const o = JSON.parse(raw);
                if (o.v !== 2 || o.deckSource !== 'firebase') return null;
                if (String(o.deckDisplayName || '').trim() !== want) return null;
                if (!Array.isArray(o.baselineWords) || !Array.isArray(o.wordsList)) return null;
                return {
                    baselineWords: o.baselineWords,
                    wordsList: o.wordsList,
                    stats:
                        o.stats && typeof o.stats === 'object'
                            ? o.stats
                            : { again: 0, hard: 0, good: 0, easy: 0 },
                };
            } catch {
                return null;
            }
        }

        /**
         * 雲端 map 快照與主 STORAGE 快照擇優（避免因只寫入其一或競態導致還原到較舊進度）。
         * @param {number|null} newBaselineLen 目前 Firebase DAY 詞數；在非同步情境可傳 `null` 略過對齊權重。
         */
        function pickBetterFirebaseProgressSnap(cloudSnap, storageSnap, newBaselineLen) {
            const norm = function (s) {
                if (!s || typeof s !== 'object') return null;
                if (!Array.isArray(s.baselineWords) || !Array.isArray(s.wordsList)) return null;
                return s;
            };
            const c = norm(cloudSnap);
            const st = norm(storageSnap);
            if (!c && !st) return null;
            if (!st) return c;
            if (!c) return st;
            const cBase = c.baselineWords.length;
            const stBase = st.baselineWords.length;
            const cRem = c.wordsList.length;
            const stRem = st.wordsList.length;
            const cRat = firebaseProgressTotalRatings(c.stats);
            const stRat = firebaseProgressTotalRatings(st.stats);
            const n = newBaselineLen == null ? null : Number(newBaselineLen);
            if (Number.isFinite(n) && n > 0) {
                const cMatch = cBase === n ? 1 : 0;
                const stMatch = stBase === n ? 1 : 0;
                if (cMatch !== stMatch) {
                    return stMatch > cMatch ? st : c;
                }
            }
            if (stRat !== cRat) {
                return stRat > cRat ? st : c;
            }
            if (stRem !== cRem) {
                return stRem < cRem ? st : c;
            }
            return st;
        }

        /** 與 test.html 相同專案的 Realtime Database */
        const firebaseConfig = {

        /** Open-Meteo／WMO 天氣代碼簡述（zh-TW 顯示用） */
        function wmoCodeToZh(code) {
            const c = Number(code);
            if (c === 0) return { emoji: '☀️', label: '晴' };
            if (c >= 1 && c <= 3) return { emoji: '🌤️', label: c === 3 ? '陰' : '多雲' };
            if (c === 45 || c === 48) return { emoji: '🌫️', label: '霧' };
            if (c >= 51 && c <= 57) return { emoji: '🌦️', label: '毛毛雨' };
            if (c >= 61 && c <= 67) return { emoji: '🌧️', label: '雨' };
            if (c >= 71 && c <= 77) return { emoji: '❄️', label: '雪' };
            if (c >= 80 && c <= 82) return { emoji: '🌧️', label: '陣雨' };
            if (c >= 85 && c <= 86) return { emoji: '❄️', label: '陣雪' };
            if (c >= 95 && c <= 99) return { emoji: '⛈️', label: '雷雨' };
            return { emoji: '🌡️', label: '其他' };
        }

        async function fetchWelcomeWeatherLine(lat, lon) {
            const u =
                'https://api.open-meteo.com/v1/forecast?latitude=' +
                encodeURIComponent(lat) +
                '&longitude=' +
                encodeURIComponent(lon) +
                '&current=temperature_2m,weather_code&timezone=auto';
            const r = await fetch(u);
            if (!r.ok) throw new Error('weather');
            const j = await r.json();
            const cur = j && j.current;
            if (!cur || typeof cur.temperature_2m !== 'number') throw new Error('weather');
            const t = Math.round(cur.temperature_2m);
            const { emoji, label } = wmoCodeToZh(cur.weather_code);
            return emoji + ' ' + t + '°C · ' + label;
        }

        /** 主畫面歡迎區：今日日期與目前天氣（免 API 金鑰，Open-Meteo） */
        function refreshWelcomeDateWeather() {
            const dateEl = document.getElementById('welcomeDateLine');
            const weatherEl = document.getElementById('welcomeWeatherLine');
            if (!dateEl || !weatherEl) return;
            const now = new Date();
            dateEl.textContent = now.toLocaleDateString('zh-TW', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
            });
            const dayKey = now.getFullYear() + '-' + now.getMonth() + '-' + now.getDate();
            const cached = welcomeWeatherCache;
            const cacheOk =
                cached.text &&
                cached.dayKey === dayKey &&
                now.getTime() - cached.at < WELCOME_WEATHER_FETCH_MIN_MS;
            if (cacheOk) {
                weatherEl.textContent = cached.text;
                return;
            }
            weatherEl.textContent = '天氣載入中…';
            function applyForecast(lat, lon) {
                fetchWelcomeWeatherLine(lat, lon)
                    .then(function (txt) {
                        welcomeWeatherCache = { dayKey: dayKey, at: Date.now(), text: txt };
                        const el = document.getElementById('welcomeWeatherLine');
                        if (el) el.textContent = txt;
                    })
                    .catch(function () {
                        const el = document.getElementById('welcomeWeatherLine');
                        if (el) el.textContent = '天氣暫時無法取得';
                    });
            }
            if (!navigator.geolocation) {
                applyForecast(WELCOME_WEATHER_FALLBACK_LAT, WELCOME_WEATHER_FALLBACK_LON);
                return;
            }
            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    applyForecast(pos.coords.latitude, pos.coords.longitude);
                },
                function () {
                    applyForecast(WELCOME_WEATHER_FALLBACK_LAT, WELCOME_WEATHER_FALLBACK_LON);
                },
                { enableHighAccuracy: false, timeout: 12000, maximumAge: 300000 }
            );
        }

        /**
         * 判斷單一節點是否為「DAY」詞表葉節點（含 extract.results 或 extracts[]）。
         */
        function isFirebaseDayChapterLeafNode(v) {
            if (!v || typeof v !== 'object') return false;
            if (v.extract && Array.isArray(v.extract.results)) return true;
            if (Array.isArray(v.extracts)) return true;
            return false;
        }

        /**
         * 掃描根節點底下「分類」鍵名：其子節點中至少有一個為 DAY 葉節點（兩層結構）。
         */
        function discoverFirebaseCategoryKeys(root) {
            if (!root || typeof root !== 'object' || Array.isArray(root)) return [];
            return Object.keys(root)
                .filter((k) => {
                    const n = root[k];
                    if (!n || typeof n !== 'object' || Array.isArray(n)) return false;
                    return Object.keys(n).some((ck) => isFirebaseDayChapterLeafNode(n[ck]));
                })
                .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
        }

        /**
         * 雲端進度在 localStorage 的鍵：有分類時為「分類名 · DAY1」，扁平根則同舊版「DAY1」。
         */
        function firebaseCloudProgressStorageKey(firebaseCategoryPrefix, dayKey) {
            const leaf = stripJsonExtension(String(dayKey || '').trim());
            const cat = String(firebaseCategoryPrefix == null ? '' : firebaseCategoryPrefix).trim();
            if (cat) return cat + ' · ' + leaf;
            return leaf;
        }

        /** 將 `firebaseCloudProgressStorageKey` 產生的字串解析回 `{ catPrefix, dayKey }`。 */
        function parseFirebaseCloudProgressStorageKey(progressKeyRaw) {
            const s = String(progressKeyRaw || '').trim();
            if (!s) return null;
            const needle = ' · ';
            const i = s.indexOf(needle);
            if (i === -1) {
                return { catPrefix: '', dayKey: s };
            }
            return {
                catPrefix: s.slice(0, i).trim(),
                dayKey: s.slice(i + needle.length).trim(),
            };
        }

        /** 由預載／快取的 `dayPickFirebaseSnapshot` 對應到 DAY 節點。 */
        function lookupFirebaseDayNodeForResume(catPrefix, dayKeyLeaf) {
            const root = dayPickFirebaseSnapshot;
            if (!root || typeof root !== 'object') return null;
            const leaf = stripJsonExtension(String(dayKeyLeaf || '').trim());
            if (!leaf) return null;
            const cat = String(catPrefix == null ? '' : catPrefix).trim();
            const sub = cat ? root[cat] : root;
            if (!sub || typeof sub !== 'object') return null;
            var node = sub[leaf];
            if (node && typeof node === 'object' && isFirebaseDayChapterLeafNode(node))
                return node;
            return null;
        }

        function resumeFirebaseChapterFromWelcome(progressKey) {
            const key = String(progressKey || '').trim();
            if (!key) return;
            const parts = parseFirebaseCloudProgressStorageKey(key);
            if (!parts || !parts.dayKey) return;
            if (!dayPickFirebaseSnapshot || typeof dayPickFirebaseSnapshot !== 'object') {
                prefetchFirebaseChapterCatalog();
                alert(
                    '雲端詞庫快照尚未載入，請數秒後再點一次，或從選單進入「章節選擇」。'
                );
                return;
            }
            const node = lookupFirebaseDayNodeForResume(parts.catPrefix, parts.dayKey);
            if (!node) {
                alert(
                    '暫時無法對應到此章節（資料可能尚未下載）；請試「章節選擇」重新進入。'
                );
                return;
            }
            applyFirebaseDayDeck(parts.dayKey, node, parts.catPrefix || '');
        }

        /**
         * 掃描根節點底下「像 test.html 的 DAY」：須含 extract.results 陣列。
         */
        function discoverFirebaseDayKeys(allData) {
            if (!allData || typeof allData !== 'object') return [];
            const keys = Object.keys(allData).filter((k) => {
                const v = allData[k];
                return isFirebaseDayChapterLeafNode(v);
            });
            keys.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
            return keys;
        }

        /**
         * 規劃 Firebase 根資料如何進入章節選單：多個詞表資料夾時 `{ A:{DAY…}, B:{DAY…} }` 會得到 multi；僅一格時自動進入該詞表 DAY 列表。
         * @returns {{ kind:'empty' } | { kind:'flat', subtree:object, rootSnap:object } | { kind:'single', key:string, subtree:object, rootSnap:object } | { kind:'multi', categories: Array<{ key:string, subtree:object }>, rootSnap:object }}
         */
        function planFirebaseRootLayout(rootVal) {
            if (!rootVal || typeof rootVal !== 'object' || Array.isArray(rootVal)) {
                return { kind: 'empty' };
            }
            const cats = discoverFirebaseCategoryKeys(rootVal);
            if (cats.length > 1) {
                let categories = cats.map((key) => ({ key: String(key), subtree: rootVal[key] })).filter(
                    (item) =>
                        item.subtree &&
                        typeof item.subtree === 'object' &&
                        discoverFirebaseDayKeys(item.subtree).length > 0
                );
                if (!categories.length) return { kind: 'empty' };
                if (categories.length === 1) {
                    const only = categories[0];
                    return {
                        kind: 'single',
                        key: only.key,
                        subtree: only.subtree,
                        rootSnap: rootVal,
                    };
                }
                return { kind: 'multi', categories, rootSnap: rootVal };
            }
            if (cats.length === 1) {
                const key = String(cats[0]);
                const subtree = rootVal[key];
                if (
                    !subtree ||
                    typeof subtree !== 'object' ||
                    !discoverFirebaseDayKeys(subtree).length
                ) {
                    return { kind: 'empty' };
                }
                return { kind: 'single', key, subtree, rootSnap: rootVal };
            }
            if (discoverFirebaseDayKeys(rootVal).length > 0) {
                return { kind: 'flat', subtree: rootVal, rootSnap: rootVal };
            }
            return { kind: 'empty' };
        }

        /** 將根資料畫成章節選單上的「詞表來源」按鈕列（不依賴單一本書鍵名） */
        function paintFirebaseLandingFromRootVal(rootVal, listEl, statusEl) {
            if (!listEl) return;

            listEl.innerHTML = '';
            if (statusEl) {
                statusEl.classList.remove('text-rose-600');
                statusEl.classList.add('text-slate-500');
            }

            if (!rootVal || typeof rootVal !== 'object') {
                dayPickFirebaseSnapshot = null;
                if (statusEl) {
                    statusEl.textContent = '目前沒有任何雲端詞庫資料';
                    statusEl.classList.remove('hidden');
                }
                return;
            }

            dayPickFirebaseSnapshot = rootVal;
            const plan = planFirebaseRootLayout(rootVal);

            if (plan.kind === 'empty') {
                if (statusEl) {
                    statusEl.textContent =
                        '目前沒有可用的雲端章節（根節點需為 DAY 詞表或可含 DAY 的子資料夾）';
                    statusEl.classList.remove('hidden');
                }
                return;
            }

            if (statusEl) {
                statusEl.textContent = '';
                statusEl.classList.add('hidden');
            }

            if (plan.kind === 'multi') {
                plan.categories.forEach(({ key, subtree }) => {
                    const n = discoverFirebaseDayKeys(subtree).length;
                    appendFirebaseCategoryBookButton(listEl, key, n, () =>
                        enterFirebaseDayPickPanel(key, subtree, key)
                    );
                });
                return;
            }

            const flatTitle = FIREBASE_TOEIC_BOOK_DISPLAY_NAME;

            if (plan.kind === 'flat') {
                const nFlat = discoverFirebaseDayKeys(plan.subtree).length;
                appendFirebaseCategoryBookButton(listEl, flatTitle, nFlat, () =>
                    enterFirebaseDayPickPanel('', plan.subtree, flatTitle)
                );
                return;
            }

            if (plan.kind === 'single') {
                const nS = discoverFirebaseDayKeys(plan.subtree).length;
                appendFirebaseCategoryBookButton(listEl, plan.key, nS, () =>
                    enterFirebaseDayPickPanel(plan.key, plan.subtree, plan.key)
                );
            }
        }

        /** 主畫面載入後即抓取詞庫目錄快照，使用者開「章節選擇」時多半是零等待。 */
        function prefetchFirebaseChapterCatalog() {
            const db = ensureFirebaseApp();
            if (!db) return;
            db.ref('/').once(
                'value',
                (snapshot) => {
                    const val = snapshot.val();
                    dayPickFirebaseSnapshot =
                        val && typeof val === 'object' ? val : null;
                    if (typeof studyBoardVisible !== 'undefined' && !studyBoardVisible) {
                        refreshWelcomeRecentDeckGrid();
                    }
                },
                () => {}
            );
        }

        /** 已有快取時在背景再拉一次並更新開啟中的章節介面（不擋使用者操作）。 */
        function refreshFirebaseChapterCatalogQuiet() {
            const db = ensureFirebaseApp();
            if (!db) return;
            db.ref('/').once(
                'value',
                (snapshot) => {
                    const val = snapshot.val();
                    dayPickFirebaseSnapshot =
                        val && typeof val === 'object' ? val : null;
                    if (typeof studyBoardVisible !== 'undefined' && !studyBoardVisible) {
                        refreshWelcomeRecentDeckGrid();
                    }
                    if (!isDayPickOpen()) return;

                    const sourcePanel = document.getElementById('dayPickSourcePanel');
                    const dayPanel = document.getElementById('dayPickDayPanel');
                    const listEl = document.getElementById('dayPickFirebaseCategoryList');
                    const booksStatusEl = document.getElementById('dayPickFirebaseBooksStatus');

                    if (
                        sourcePanel &&
                        !sourcePanel.classList.contains('hidden') &&
                        listEl
                    ) {
                        paintFirebaseLandingFromRootVal(
                            dayPickFirebaseSnapshot,
                            listEl,
                            booksStatusEl
                        );
                    }

                    if (dayPanel && !dayPanel.classList.contains('hidden')) {
                        refreshFirebaseDayPickerGrid();
                    }
                },
                () => {}
            );
        }

        /** 開啟章節選單：若已有預載快照則立即畫入，並在背景靜默更新一次。否則顯示連線中並抓取。 */
        function loadFirebaseChapterBooksLanding() {
            const listEl = document.getElementById('dayPickFirebaseCategoryList');
            const statusEl = document.getElementById('dayPickFirebaseBooksStatus');
            if (!listEl || !statusEl) return;

            const cached =
                dayPickFirebaseSnapshot &&
                typeof dayPickFirebaseSnapshot === 'object'
                    ? dayPickFirebaseSnapshot
                    : null;

            if (cached) {
                paintFirebaseLandingFromRootVal(cached, listEl, statusEl);
                refreshFirebaseChapterCatalogQuiet();
                return;
            }

            listEl.innerHTML = '';
            statusEl.classList.remove('hidden', 'text-rose-600');
            statusEl.classList.add('text-slate-500');
            statusEl.textContent = '詞庫連線中…';

            const db = ensureFirebaseApp();
            if (!db) {
                statusEl.classList.remove('text-slate-500');
                statusEl.classList.add('text-rose-600');
                statusEl.textContent = '無法初始化 Firebase（腳本未載入或被阻擋）。';
                return;
            }

            db.ref('/').once(
                'value',
                (snapshot) => {
                    const val = snapshot.val();
                    paintFirebaseLandingFromRootVal(val, listEl, statusEl);
                },
                (error) => {
                    statusEl.classList.remove('text-slate-500');
                    statusEl.classList.add('text-rose-600');
                    statusEl.textContent =
                        '連線失敗：' +
                        (error && error.message ? error.message : String(error));
                    statusEl.classList.remove('hidden');
                }
            );
        }

        /** 依可視寬與軌道寬度開關合併詞表 DAY 列往返動畫（每張卡片各自一套） */
        function applyCustomDeckChipMarqueeSizing(wrapEl, trackEl) {
            if (!(wrapEl instanceof HTMLElement) || !(trackEl instanceof HTMLElement))
                return;
            var drift = Math.max(0, trackEl.scrollWidth - wrapEl.clientWidth);
            if (drift > 0.5) {
                trackEl.style.setProperty('--deck-chip-drift', Math.round(drift) + 'px');
                trackEl.classList.add('custom-deck-chip-track--pingpong');
                wrapEl.classList.add('custom-deck-chips-marquee-pause');
            } else {
                trackEl.style.removeProperty('--deck-chip-drift');
                trackEl.classList.remove('custom-deck-chip-track--pingpong');

        /** 全格重測：雙欄排版／字體載入後初次量測常為 0，導致只有先完成 layout 的那一張會開動畫 */
        function remeasureAllCustomDeckChipMarquees() {
            document
                .querySelectorAll('#dayPickCustomGrid, .home-recent-deck-subgrid')
                .forEach(function (g) {
                    if (!g) return;
                    g.querySelectorAll('.custom-deck-chips-wrap').forEach(function (wrapEl) {
                        var trackEl = wrapEl.querySelector(':scope > .custom-deck-chip-track');
                        if (!(trackEl instanceof HTMLElement)) return;
                        applyCustomDeckChipMarqueeSizing(wrapEl, trackEl);
                    });
                });
        }

        /** 合併自選詞表：DAY 列超寬時以 CSS 動畫左右往返（wrap 裁剪、軌道 transform） */
        function setupCustomDeckMergedChipRowMarquee(wrapEl, trackEl) {
            if (!(wrapEl instanceof HTMLElement) || !(trackEl instanceof HTMLElement))
                return;
            var ro = null;
            function sync() {
                if (!wrapEl.isConnected) {
                    if (ro) {
                        ro.disconnect();
                        ro = null;
                    }
                    return;
                }
                applyCustomDeckChipMarqueeSizing(wrapEl, trackEl);
            }
            sync();
            requestAnimationFrame(sync);
            requestAnimationFrame(function () {
                requestAnimationFrame(sync);
            });
            if (typeof ResizeObserver !== 'undefined') {
                ro = new ResizeObserver(sync);
                ro.observe(wrapEl);
                ro.observe(trackEl);
            }
        }

        /** 供「最近學習」排序：同一牌組以最後一次 persist（學習互動）時間為準。 */
        function readWelcomeStorageTouchMeta() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const o = JSON.parse(raw);
                if (o.v !== 2 || !o.deckDisplayName) return null;
                const name = String(o.deckDisplayName || '').trim();
                if (!name) return null;
                return {
                    deckDisplayName: name,
                    deckSource: o.deckSource === 'firebase' ? 'firebase' : 'import',
                    lastStudiedAt: Number(o.lastStudiedAt) || 0,
                };
            } catch {
                return null;
            }
        }

        /** 主畫面「最近學習」：自選歷程 + 雲端 DAY 進度（localStorage）合併排序。 */
        function getMergedWelcomeRecentDeckRows() {
            const rows = [];
            const touchMeta = readWelcomeStorageTouchMeta();
            getCustomDeckListForPicker().forEach(function (entry) {
                if (!welcomeRecentActivityQualifies(entry)) return;
                const nm = String(entry.displayName || '').trim();
                let touch = Number(entry.savedAt) || 0;
                if (touchMeta && touchMeta.deckSource === 'import' && nm === touchMeta.deckDisplayName) {
                    touch = Math.max(touch, touchMeta.lastStudiedAt || 0);
                }
                rows.push({
                    savedAt: touch,
                    item: entry,
                });
            });
            const cloudMap = loadCloudDayProgressMap();
            if (cloudMap && typeof cloudMap === 'object') {
                Object.keys(cloudMap).forEach(function (progressKey) {
                    const snapCloud = cloudMap[progressKey];
                    if (!snapCloud || typeof snapCloud !== 'object') return;
                    if (!Array.isArray(snapCloud.baselineWords) || !snapCloud.baselineWords.length)
                        return;
                    if (!Array.isArray(snapCloud.wordsList)) return;
                    const snap = pickBetterFirebaseProgressSnap(
                        snapCloud,
                        readStorageFirebaseSnapshotForKey(progressKey),
                        null
                    );
                    if (!snap) return;
                    const statsObj =
                        snap.stats && typeof snap.stats === 'object'
                            ? snap.stats
                            : { again: 0, hard: 0, good: 0, easy: 0 };
                    const pseudo = {
                        displayName: progressKey,
                        source: 'firebase',
                        baselineWords: snap.baselineWords,
                        wordsList: snap.wordsList,
                        stats: statsObj,
                        savedAt: Number(snap.savedAt) || 0,
                        initialTotal: snap.baselineWords.length,
                        __homeFirebaseResume: true,
                    };
                    if (!welcomeRecentActivityQualifies(pseudo)) return;
                    let touch = Number(snap.savedAt) || 0;
                    if (
                        touchMeta &&
                        touchMeta.deckSource === 'firebase' &&
                        String(progressKey).trim() === touchMeta.deckDisplayName
                    ) {
                        touch = Math.max(touch, touchMeta.lastStudiedAt || 0);
                    }
                    rows.push({
                        savedAt: touch,
                        item: pseudo,
                    });
                });
            }
            rows.sort(function (a, b) {
                return b.savedAt - a.savedAt;
            });
            return rows.slice(0, HOME_RECENT_DECKS_MAX);
        }

        /** 主畫面歡迎區：最近學習依「大分類」分區，標題獨一行、其下為雙欄卡片。 */

        /**
         * 雲端進度鍵對應的確認／無障礙用短名（分隔符為 —）。
         */
        function firebaseCloudProgressStorageLabel(cat, dayKey) {
            const leaf = stripJsonExtension(String(dayKey || '').trim());
            const c = String(cat || '').trim();
            if (c) return c + ' — ' + leaf;
            return leaf;
        }

        /** 章節選擇畫面上雲端 DAY 列表若開啟則重繪。 */
        function refreshFirebaseDayPickerGrid() {
            const dayPanel = document.getElementById('dayPickDayPanel');
            if (
                !dayPickFirebaseSnapshot ||
                !dayPanel ||
                dayPanel.classList.contains('hidden')
            ) {
                return;
            }
            const sub =
                typeof dayPickFirebaseCategoryKey === 'string' &&
                dayPickFirebaseCategoryKey.length > 0
                    ? dayPickFirebaseSnapshot[dayPickFirebaseCategoryKey]
                    : dayPickFirebaseSnapshot;
            if (!sub) return;
            renderDayPickGrid(sub, dayPickFirebaseCategoryKey || '');
        }

        function resetCloudDayChapter(dayKey, firebaseCategoryPrefix) {
            const catPrefix =
                firebaseCategoryPrefix === undefined || firebaseCategoryPrefix === null
                    ? ''
                    : String(firebaseCategoryPrefix);
            const progressKey = firebaseCloudProgressStorageKey(catPrefix, dayKey);
            const confirmLabel = firebaseCloudProgressStorageLabel(catPrefix, dayKey);
            if (
                !confirm(`確定要重置「${confirmLabel}」的學習進度？\n此操作無法復原。`)
            )
                return;
            try {
                const map = loadCloudDayProgressMap();
                delete map[progressKey];
                localStorage.setItem(CLOUD_DAY_PROGRESS_KEY, JSON.stringify(map));
            } catch (err) {
                console.warn(err);
            }
            const isCurrent =
                deckSource === 'firebase' &&
                String(currentDeckDisplayName || '').trim() === progressKey &&
                baselineWords.length > 0;
            if (isCurrent) {
                wordsList = baselineWords.slice();
                stats.again = stats.hard = stats.good = stats.easy = 0;
                isFlipped = false;
                resetFlip();
                updateStatsUi();
                suppressCardAutoSpeak = true;
                persistState();
                refreshStudyChrome();
            }
            refreshFirebaseDayPickerGrid();
            refreshWelcomeRecentDeckGrid();
        }

                typeof dayPickFirebaseCategoryKey === 'string' &&

        /** 將複選章節併成一筆自選紀錄：進度為 import，不影響 CLOUD_DAY_PROGRESS。 */
        function mergeFirebaseChapterSelectionToCustom() {
            const sub = firebaseDaySubtreeForPicker();
            if (!sub || firebaseChapterSelectedDayKeys.size === 0) return;

            const ordered = discoverFirebaseDayKeys(sub).filter((k) =>
                firebaseChapterSelectedDayKeys.has(k)
            );
            if (!ordered.length) return;

            const seenKwLower = new Set();
            const mergedRaw = [];

            ordered.forEach((dk) => {
                const node = sub[dk];
                if (!node || typeof node !== 'object') return;
                const rawChunk = extractEntriesFromUnknownJson(node);
                rawChunk.forEach((e) => {
                    const nw = normalizeEntry(e);
                    if (!nw.keyword) return;
                    const kl = nw.keyword.trim().toLowerCase();
                    if (!kl || seenKwLower.has(kl)) return;
                    seenKwLower.add(kl);
                    mergedRaw.push(e);
                });
            });

            if (!mergedRaw.length) {
                alert('所選章節沒有可合併的單字。');
                return;
            }

            const displayName = makeFirebaseMergedCustomDeckDisplayName(ordered);
            const catKey =
                typeof dayPickFirebaseCategoryKey === 'string' &&
                dayPickFirebaseCategoryKey.length > 0
                    ? dayPickFirebaseCategoryKey
                    : '';
            prependImportedDeckToHistoryFromRaw(mergedRaw, displayName, {
                mergedFromFirebase: {
                    categoryKey: catKey,
                    dayKeys: ordered.slice(),
                },
            });
            clearFirebaseChapterMultiSelectState();

            openCustomWordListPanel();
            const hint = document.getElementById('dayPickCustomHint');
            if (hint) {

        function bindFirebaseChapterDayCardGestures(wrap, dayKey, node, catPrefix) {
            wrap.dataset.firebaseDayKey = dayKey;
            wrap.addEventListener(
                'contextmenu',
                (e) => {
                    if (!(e.target && e.target.closest && e.target.closest('.chapter-reset-btn')))
                        e.preventDefault();
                },
                false
            );

            wrap.addEventListener('pointerdown', (e) => {
                if (
                    e.target.closest &&
                    e.target.closest('.chapter-reset-btn')
                )
                    return;
                if (e.pointerType === 'mouse' && e.button !== 0) return;

                const sx = e.clientX;
                const sy = e.clientY;
                let released = false;
                const tid = window.setTimeout(() => {
                    if (released) return;
                    suppressNextFirebaseDayClickForDayKey = dayKey;
                    firebaseChapterMultiSelectActive = true;
                    if (firebaseChapterSelectedDayKeys.has(dayKey)) {
                        firebaseChapterSelectedDayKeys.delete(dayKey);
                        setFirebaseDayCardSelectedVisual(wrap, false);
                    } else {
                        firebaseChapterSelectedDayKeys.add(dayKey);
                        setFirebaseDayCardSelectedVisual(wrap, true);
                    }
                    if (firebaseChapterSelectedDayKeys.size === 0)
                        firebaseChapterMultiSelectActive = false;
                    updateFirebaseChapterMergeBarUi();
                }, FIREBASE_DAY_LONG_PRESS_MS);

                function cleanup() {
                    released = true;
                    window.clearTimeout(tid);
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                    window.removeEventListener('pointercancel', onUp);
                }

                function onMove(ev) {
                    if (
                        Math.hypot(ev.clientX - sx, ev.clientY - sy) >
                        FIREBASE_DAY_LONG_PRESS_MOVE_PX
                    ) {
                        cleanup();
                    }
                }

                function onUp() {
                    cleanup();
                }

                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
                window.addEventListener('pointercancel', onUp);
            });

            wrap.addEventListener('click', (e) => {
                if (
                    e.target.closest &&
                    e.target.closest('.chapter-reset-btn')
                )
                    return;
                if (
                    suppressNextFirebaseDayClickForDayKey !== null &&
                    suppressNextFirebaseDayClickForDayKey === dayKey
                ) {
                    e.preventDefault();
                    e.stopPropagation();
                    suppressNextFirebaseDayClickForDayKey = null;
                    return;
                }
                if (firebaseChapterMultiSelectActive) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (firebaseChapterSelectedDayKeys.has(dayKey)) {
                        firebaseChapterSelectedDayKeys.delete(dayKey);
                        setFirebaseDayCardSelectedVisual(wrap, false);
                    } else {
                        firebaseChapterSelectedDayKeys.add(dayKey);
                        setFirebaseDayCardSelectedVisual(wrap, true);
                    }
                    if (firebaseChapterSelectedDayKeys.size === 0)
                        firebaseChapterMultiSelectActive = false;
                    updateFirebaseChapterMergeBarUi();
                    return;
                }
                applyFirebaseDayDeck(dayKey, node, catPrefix);
            });

            wrap.addEventListener('keydown', (e) => {
                if (
                    e.target.closest &&
                    e.target.closest('.chapter-reset-btn')
                )
                    return;
                if (e.key !== 'Enter' && e.key !== ' ') return;
                e.preventDefault();
                if (firebaseChapterMultiSelectActive) {
                    if (firebaseChapterSelectedDayKeys.has(dayKey)) {
                        firebaseChapterSelectedDayKeys.delete(dayKey);
                        setFirebaseDayCardSelectedVisual(wrap, false);
                    } else {
                        firebaseChapterSelectedDayKeys.add(dayKey);
                        setFirebaseDayCardSelectedVisual(wrap, true);
                    }
                    if (firebaseChapterSelectedDayKeys.size === 0)
                        firebaseChapterMultiSelectActive = false;
                    updateFirebaseChapterMergeBarUi();
                } else applyFirebaseDayDeck(dayKey, node, catPrefix);
            });
        }

        /** 繪製雲端 DAY 卡片（含重置圖示）。`firebaseCategoryPrefix`：根下扁平為 `''`，有分類層為分類鍵名字串。 */
